name: Type Check

on:
    push:
        branches:
            - master
    pull_request:

jobs:
    type-check:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'

            - name: Install dependencies
              run: npm install

            - name: Run type-check
              run: npm run type-check
