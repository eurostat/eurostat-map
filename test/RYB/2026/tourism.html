<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Coxcomb Custom Data - Simplified API</title>
        <style>
            .em-tooltip {
                max-width: 300px !important;
            }
        </style>
    </head>
    <body>
        <svg id="map"></svg>

        <script src="../../../build/eurostatmap.js"></script>
        <script>
            // NEW: Much simpler API! Just pass customData directly to statCoxcomb()
            // No more callbacks, manual data transformation, or complex setup required.

            const customData = {
                // Format: regionId: { month: { category: value } }
                FR: {
                    M01: { DOM: 1500, FOR: 800, TOTAL: 2300 },
                    M02: { DOM: 1600, FOR: 900, TOTAL: 2500 },
                    M03: { DOM: 1800, FOR: 1200, TOTAL: 3000 },
                    M04: { DOM: 2200, FOR: 1500, TOTAL: 3700 },
                    M05: { DOM: 2500, FOR: 1800, TOTAL: 4300 },
                    M06: { DOM: 3000, FOR: 2200, TOTAL: 5200 },
                },
                DE: {
                    M01: { DOM: 2200, FOR: 1200, TOTAL: 3400 },
                    M02: { DOM: 2100, FOR: 1300, TOTAL: 3400 },
                    M03: { DOM: 2500, FOR: 1600, TOTAL: 4100 },
                    M04: { DOM: 2800, FOR: 1900, TOTAL: 4700 },
                    M05: { DOM: 3200, FOR: 2300, TOTAL: 5500 },
                    M06: { DOM: 3500, FOR: 2600, TOTAL: 6100 },
                },
                IT: {
                    M01: { DOM: 1800, FOR: 1000, TOTAL: 2800 },
                    M02: { DOM: 1900, FOR: 1100, TOTAL: 3000 },
                    M03: { DOM: 2300, FOR: 1400, TOTAL: 3700 },
                    M04: { DOM: 2700, FOR: 1700, TOTAL: 4400 },
                    M05: { DOM: 3100, FOR: 2100, TOTAL: 5200 },
                    M06: { DOM: 3400, FOR: 2400, TOTAL: 5800 },
                },
                ES: {
                    M01: { DOM: 1200, FOR: 1500, TOTAL: 2700 },
                    M02: { DOM: 1300, FOR: 1600, TOTAL: 2900 },
                    M03: { DOM: 1600, FOR: 2000, TOTAL: 3600 },
                    M04: { DOM: 2000, FOR: 2500, TOTAL: 4500 },
                    M05: { DOM: 2400, FOR: 3000, TOTAL: 5400 },
                    M06: { DOM: 2800, FOR: 3500, TOTAL: 6300 },
                },
            }

            const map = eurostatmap
                .map('coxcomb')
                .width(600)
                .nutsLevel('mixed')
                .statCoxcomb({
                    customData: customData,
                    times: ['M01', 'M02'],
                    timeLabels: ['Jan', 'Feb'],
                    categoryCodes: ['DOM', 'FOR'],
                    categoryLabels: ['Domestic', 'Foreign'],
                    categoryColors: ['#1b9e77', '#d95f02'],
                    totalCode: 'TOTAL',
                    unitText: 'Nights',
                })
                .coxcombMaxRadius(40)
                .coxcombMinRadius(40)
                .build()
        </script>
    </body>
</html>
