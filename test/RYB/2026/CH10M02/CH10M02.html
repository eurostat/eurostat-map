<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Coxcomb Custom Data - Simplified API</title>
        <style>
            /* Insets */
            #titleLI,
            #subtitleLI {
                pointer-events: none !important;
                stroke: none !important;
                stroke-linejoin: round !important;
                paint-order: stroke !important;
            }
            .em-inset-title,
            .em-inset-subtitle,
            #titleLI,
            #subtitleLI {
                font-size: 8.5px !important;
            }
            .em-inset-title,
            .em-inset-subtitle,
            #subtitleLI {
                fill: #4c4b4b !important;
            }
            #titleLI {
                fill: white !important;
                stroke-width: 2px !important;
                stroke: white !important;
                opacity: 0.8 !important;
            }
            #em-frame-PT20 {
                stroke-width: 0.2px;
            }
            g[index='8'] #em-frame-PT20 {
                stroke-width: 0px !important;
            }
            #em-frame-GP {
                stroke-width: 0.2px;
            }
            g[index='1'] #em-frame-GP {
                stroke-width: 0px !important;
            }
            .em-scalebar-label {
                font-size: 8px !important;
                fill: #878787 !important;
            }
            .em-scalebar-line {
                stroke: #878787 !important;
            }
            .em-inset-title,
            .em-inset-subtitle,
            #subtitleLI {
                fill: #676767 !important;
            }

            button {
                margin: 10px;
                padding: 10px 20px;
                cursor: pointer;
                font-size: 16px;
            }
            #log {
                height: 100%;
                font-family: monospace;
                background: #f0f0f0;
                padding: 10px;
                max-height: 600px;
                overflow-y: auto;
                font-size: 12px;
            }
            .em-inset .em-zoom-buttons {
                display: none;
            }
        </style>
    </head>
    <body>
        <svg id="container" width="100%" height="97vh">
            <g id="map"></g>
            <g id="newInsets"></g>
        </svg>

        <script src="../../../../build/eurostatmap.js"></script>
        <script src="https://unpkg.com/d3@7"></script>
        <script src="./overseas.js"></script>
        <script>
            const MAPWIDTH = 797
            const MAPHEIGHT = 677
            // Generate fresh inset config with new svgIds (from overseas.js)
            const insetsCfg = createOutermostInsetsConfig()
            const insetBoxPosition = [550, 23]
            createInsetDOMElements(insetsCfg, insetBoxPosition)

            // data
            const MONTH_KEYS = ['M01', 'M02', 'M03', 'M04', 'M05', 'M06', 'M07', 'M08', 'M09', 'M10', 'M11', 'M12']
            const CSV_MONTH_COLS = [
                'January',
                'February',
                'March',
                'April',
                'May',
                'June',
                'July',
                'August',
                'September',
                'October',
                'November',
                'December',
            ]

            async function loadData() {
                const [domRes, forRes] = await Promise.all([fetch('DOMESTIC.csv'), fetch('INTERNATIONAL.csv')])
                const [domText, forText] = await Promise.all([domRes.text(), forRes.text()])

                const domData = parseCSV(domText)
                const forData = parseCSV(forText)

                const customData = {}
                const allNuts = new Set([...Object.keys(domData), ...Object.keys(forData)])

                allNuts.forEach((nuts) => {
                    customData[nuts] = {}
                    MONTH_KEYS.forEach((month) => {
                        const dom = domData[nuts]?.[month] ?? 0
                        const forVal = forData[nuts]?.[month] ?? 0
                        customData[nuts][month] = {
                            DOM: dom,
                            FOR: forVal,
                            TOTAL: dom + forVal,
                        }
                    })
                })

                return customData
            }

            loadData().then((customData) => {
                const map = eurostatmap
                    .map('coxcomb')
                    .width(MAPWIDTH)
                    .height(MAPHEIGHT)
                    .position({ x: 4800000, y: 3400000, z: 6000 })
                    .dorling(true)
                    .dorlingStrength({ x: 10, y: 10 }) // Gravity toward original position
                    .dorlingIterations(1) // Collision detection iterations
                    .dorlingPadding(-1) // Minimum distance between circles
                    .animateDorling(false) // Skip animation for immediate result
                    .nutsLevel('mixed')
                    .statCoxcomb({
                        customData: customData,
                        times: MONTH_KEYS,
                        timeLabels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'],
                        categoryCodes: ['DOM', 'FOR'],
                        categoryLabels: ['Domestic', 'Foreign'],
                        categoryColors: ['#1b9e77', '#d95f02'],
                        totalCode: 'TOTAL',
                        unitText: 'Nights',
                    })
                    .coxcombMaxRadius(34)
                    .coxcombMinRadius(5)
                    .coxcombRings(false)
                    .zoomButtons(false)
                    .insets(insetsCfg)
                    .insetBoxPosition(insetBoxPosition)
                    .legend({
                        boxOpacity: 1,
                        x: 643,
                        y: 280,
                        sizeLegend: {
                            title: 'Nights spent',
                            marginTop: 50,
                            titlePadding: 10,
                            noData: false,
                            values: [24000000, 10000000, 1000000],
                            labels: ['24 million', '10 million', '1 million'],
                        },
                        colorLegend: { title: 'Tourist origin', marginTop: 30, titlePadding: 10, noData: false },
                        timeLegend: { title: 'Month', titlePadding: 33, marginTop: -40 },
                    })
                    .bottomText(false)
                    .header(true)
                    .footer(true)
                    .showEstatLogo(true)
                    .showEstatRibbon(true)
                    .logoPosition([2, MAPHEIGHT - 12])
                    .ribbonPosition([MAPWIDTH - 180, MAPHEIGHT - 17])
                    .ribbonWidth(300)
                    .ribbonHeight(50)
                    .footnoteWrap(100)
                    .footnote('Note goes here')
                    .onBuild(() => {
                        //add cartography footnote

                        d3.select('#map #em-footnote-2').remove()
                        d3.selectAll('#map')
                            .append('text')
                            .attr('x', MAPWIDTH - 315)
                            .attr('y', MAPHEIGHT + 55)
                            .attr('class', 'em-footnote')
                            .attr('id', 'em-footnote-2')
                            .append('tspan')
                            .html('Cartography: GISCO, Boundaries: ©EuroGeographics ©OSM')
                    })
                    .build()

                // Check what the map has after a short delay to allow async build to finish
                setTimeout(() => {
                    console.log('svg children count:', document.querySelector('#map').children.length)
                    console.log('any coxcomb paths:', document.querySelectorAll('#map path').length)
                }, 3000)
            })

            // Properly splits a CSV line respecting quoted fields
            function splitCSVLine(line) {
                const result = []
                let current = ''
                let inQuotes = false
                for (let i = 0; i < line.length; i++) {
                    const ch = line[i]
                    if (ch === '"') {
                        inQuotes = !inQuotes
                    } else if (ch === ',' && !inQuotes) {
                        result.push(current)
                        current = ''
                    } else {
                        current += ch
                    }
                }
                result.push(current)
                return result
            }

            function parseCSV(text) {
                const lines = text.trim().split('\n')
                const headers = splitCSVLine(lines[0])
                const data = {}
                for (let i = 1; i < lines.length; i++) {
                    const cols = splitCSVLine(lines[i])
                    const nuts = cols[0].trim()
                    if (!nuts) continue
                    data[nuts] = {}
                    CSV_MONTH_COLS.forEach((month, idx) => {
                        const colIdx = headers.indexOf(month)
                        const raw = colIdx !== -1 ? cols[colIdx] : ''
                        data[nuts][MONTH_KEYS[idx]] = raw ? parseFloat(raw) * 1_000_000 || 0 : 0
                    })
                }
                return data
            }
        </script>
    </body>
</html>
