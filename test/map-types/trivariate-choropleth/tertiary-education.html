<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    </head>

    <body>
        <style>
            .em-zoom-buttons {
                transform: translate(1%, 15%);
            }
            .em-legend-subtitle {
                font-size: 13px;
            }
        </style>
        <svg id="map"></svg>
        <script src="../../../build/eurostatmap.js"></script>
        <script type="module">
            import { json } from 'https://cdn.jsdelivr.net/npm/d3-fetch@3/+esm'

            const [bachelor_pct, masters_pct, phd_pct] = await Promise.all([
                json('./data/bachelor_pct.json'),
                json('./data/masters_pct.json'),
                json('./data/phd_pct.json'),
            ])

            const legendLabelPosition = 'corner' // 'corner' | 'inside'
            const legendColorTarget = 'points' // 'points' | 'triangles'
            const meanCentering = true
            const map = eurostatmap
                .map('trivariateChoropleth')
                .position({ x: 4900000, y: 3620000, z: 6440 })
                .width(825)
                .title('Tertiary education students')
                .subtitle(
                    `<tspan x="14" dy="0"><tspan class="badge-green">Bachelor</tspan>, <tspan class="badge-blue">Masters</tspan> or <tspan class="badge-red">PHD</tspan> students.</tspan>`
                )
                .nutsLevel(2)
                .ternarySettings({
                    hue: 160,
                    chroma: 130,
                    lightness: 40,
                    contrast: 0,
                    spread: 3.5,
                    breaks: 29,
                    meanCentering: meanCentering,
                })
                .legend({
                    title: 'Education level',
                    subtitle: `
                        <tspan x="8" dy="0">Areas with more <tspan fill="#007b00" class='subtitle-color'>green</tspan> have a higher %</tspan>
                        <tspan x="8" dy="1.2em"> of bachelor students. Areas with more <tspan fill="#0067ff" class='subtitle-color'>blue</tspan> have </tspan>
                        <tspan x="8" dy="1.2em">a higher % of masters students and areas with 
                        <tspan x="8" dy="1.2em">more <tspan fill="#df0000" class='subtitle-color'>red</tspan> have a higher</tspan> % of PHD students.</tspan>
                        <tspan x="8" dy="1.2em">Hover your mouse over the legend to explore it.</tspan>
                    `,
                    x: 510,
                    y: 3,
                    boxOpacity: 0.99,
                    width: 250,
                    height: 320,
                    labels: legendLabelPosition == 'corner' ? ['Bachelors', 'Masters', 'PHD'] : ['← Bachelors', 'Masters →', 'PHD →'],
                    labelPosition: legendLabelPosition,
                    padding: { top: 75, right: 30, bottom: 10, left: 50 },
                    showLines: true,
                    showCenter: meanCentering,
                    centerLabel: 'Average',
                    showData: true,
                    colorTarget: legendColorTarget, // 'points' | 'triangles'
                    centerAnnotationOffsets: {
                        labelX: -35,
                        labelY: 15,
                        curveX: 0,
                        curveY: 0,
                    },
                })
                .zoomButtons(true)
                .zoomButtonsPosition([740, 590])

            map.onBuild(() => {
                const badges = [
                    { cls: 'badge-green', color: '#007b00' },
                    { cls: 'badge-blue', color: '#0067ff' },
                    { cls: 'badge-red', color: '#df0000' },
                ]
                const svg = select('#' + map.svgId)
                const subtitle = svg.select('.em-legend-subtitle')
                if (!subtitle.node()) return

                badges.forEach(({ cls, color }) => {
                    const tspan = subtitle.select('.' + cls)
                    if (!tspan.node()) return
                    const bb = tspan.node().getBBox()
                    const pad = { x: 3, y: 2 }
                    // Insert rect before the tspan in the DOM
                    const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect')
                    select(rect)
                        .attr('x', bb.x - pad.x)
                        .attr('y', bb.y - pad.y)
                        .attr('width', bb.width + pad.x * 2)
                        .attr('height', bb.height + pad.y * 2)
                        .attr('rx', 2)
                        .attr('fill', color)
                    subtitle.node().parentNode.insertBefore(rect, subtitle.node())
                    // Make the tspan text white
                    tspan.attr('fill', 'white')
                })
            })

            map.stat('v1', { label: 'Bachelor' }).stat('v2', { label: 'Master' }).stat('v3', { label: 'PhD' })
            map.build()
            map.statData('v1').setData(filterNulls(bachelor_pct))
            map.statData('v2').setData(filterNulls(masters_pct))
            map.statData('v3').setData(filterNulls(phd_pct))

            // map.updateStatValues()

            function filterNulls(obj) {
                return Object.fromEntries(Object.entries(obj).filter(([_, v]) => v !== null))
            }
        </script>
    </body>
</html>
