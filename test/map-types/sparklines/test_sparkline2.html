<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    </head>

    <body>
        <style>
            /* Region fill */
            .em-cntrg,
            .em-nutsrg,
            .em-grid-cell {
                fill: #efefef !important;
            }

            /*  borders */
            .em-cntbn,
            .em-worldbn,
            g#em-cntbn > .em-bn-oth:not(.em-bn-co):not(.em-bn-cc):not(.em-bn-eu):not(.em-bn-efta) {
                stroke-width: 0.3px !important;
                stroke: #ffffff !important;
            }
            /*  borders */
            .em-bn-1,
            .em-bn-2,
            .em-bn-3,
            .em-nutsrg [lvl='3'],
            .em-nutsrg [lvl='2'],
            .em-nutsrg [lvl='1'] {
                stroke-width: 0px !important;
                stroke: #ffffff !important;
            }
        </style>
        <svg id="map"></svg>
        <script src="../../../build/eurostatmap.js"></script>
        <script>
            eurostatmap
                .map('sparkline')
                .gridCartogram(true)
                //.width(800)
                .title('Demand for energy needed to heat a building ')
                .subtitle('Heating degree days (HDD) 2009-2021')
                .nutsLevel(0)
                .stat({
                    eurostatDatasetCode: 'nrg_chddr2_a',
                    filters: { indic_nrg: 'HDD' },
                    dates: ['2009', '2010', '2011', '2012', '2013', '2014', '2015', '2016', '2017', '2018', '2019', '2020', '2021'],
                    labels: ['2009', '2010', '2011', '2012', '2013', '2014', '2015', '2016', '2017', '2018', '2019', '2020', '2021'],
                })
                .sparkSettings({ type: 'bar' })
                .sparkSettings({ lineWidth: 25 })
                .sparkSettings({ lineStrokeWidth: 1 })
                .sparkSettings({ lineColor: '#c44a4a' })
                .sparkSettings({ lineHeight: 50 })
                .sparkSettings({ lineOpacity: 0.7 })
                .sparkSettings({ lineCircleRadius: 0.1 })
                .tooltip({
                    xOffset: 30,
                    yOffset: 150,
                    fontSize: '12px',
                    maxWidth: Math.min(400, window.innerWidth),
                })
                .sparkSettings({ tooltipChart: {
                    width: 150,
                    height: 50,
                    margin: { left: 60, right: 40, top: 20, bottom: 40 },
                    circleRadius: 1.5,
                } })
                .build()
        </script>
    </body>
</html>
