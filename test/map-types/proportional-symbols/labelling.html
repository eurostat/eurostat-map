<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>eurostat-map.js</title>
    </head>

    <body>
        <svg id="map"></svg>
        <script src="../../../build/eurostatmap.js"></script>
        <script>
            // basic barebones proportional circles example
            let map = eurostatmap
                .map('proportionalSymbol')
                .title('Labelling')
                .subtitle('Labels can be added to the symbols')
                .psSettings({ shape: 'circle' })
                .psSettings({ spikeWidth: 7 })
                .nutsLevel(0)
                .stat('symbolSize', {
                    eurostatDatasetCode: 'nama_10r_3gdp',
                    unitText: 'Million EUR',
                    filters: { unit: 'MIO_EUR', time: '2018' },
                })
                .encoding('size', { stat: 'symbolSize' })
                .legend({ title: 'Million EUR', x: 550, y: 90, boxOpacity: 0, sizeLegend: { noData: true } })
                .labels({ values: true, shadows: true })
                .psSettings({ codeLabels: true })
                .insets(false)
                .psSettings({ stroke: 'white' })
                .psSettings({ strokeWidth: 0.5 })
                .psSettings({ sizeScale: 'linear' })
                .psSettings({ minSize: 10 })
                .dorling(true)
                .psSettings({ maxSize: 60 }) // try: cross, diamond, star, square, wye, circle, triangle, rectangle https://github.com/d3/d3-shape#symbols

            map.build()
        </script>
    </body>
</html>
