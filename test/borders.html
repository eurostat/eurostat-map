<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <style>
            /* country boundaries */
            #map2 .em-cntbn {
                stroke: #6d6d6d;
                stroke-width: 0.5px;
                opacity: 1;
            }

            /* country boundary halo (not coastline) */
            #map2 .em-cntbn-halo:not(.em-bn-co) {
                stroke: white;
                stroke-width: 0px;
                opacity: 1;
            }

            /* coastline */
            #map2 .em-bn-co {
                stroke: white;
                stroke-width: 0px;
            }

            #map2 .em-nutsrg [lvl='3'],
            #map2 .em-nutsrg [lvl='2'],
            #map2 .em-nutsrg [lvl='1'] {
                stroke: #868686;
            }
        </style>
    </head>

    <body>
        <svg id="map"></svg>
        <svg id="map2"></svg>
        <script src="../build/eurostatmap.js"></script>
        <script src="./data/mixed.js"></script>
        <script>
            const nutsLevel = 'mixed' // IMAGE
            const map = eurostatmap
                .map('choropleth')
                .width(800)
                .height(800)
                .scale('20M')
                .nutsLevel(nutsLevel)
                .title('style 1')
                //.stat('value', { eurostatDatasetCode: 'demo_r_d3dens', unitText: 'people/km²', filters: { TIME: '2023' } })
                //.stat('value', { eurostatDatasetCode: 'nama_10r_3gdp', unitText: 'EUR/inhabitant', filters: { unit: 'EUR_HAB', time: '2022' } })
                .zoomExtent([1, 1000])
                .numberOfClasses(4)
                .legend({
                    title: 'Euro per inhabitant',
                    x: 560,
                    y: 90,
                })
                .build()

            const map2 = eurostatmap
                .map('choropleth')
                .width(800)
                .height(800)
                .svgId('map2')
                .scale('20M')
                .nutsLevel(nutsLevel)
                .title('style 2')
                //.stat('value', { eurostatDatasetCode: 'demo_r_d3dens', unitText: 'people/km²', filters: { TIME: '2023' } })
                //.stat('value', { eurostatDatasetCode: 'nama_10r_3gdp', unitText: 'EUR/inhabitant', filters: { unit: 'EUR_HAB', time: '2022' } })
                .zoomExtent([1, 1000])
                .numberOfClasses(4)
                .legend({
                    title: 'Euro per inhabitant',
                    x: 560,
                    y: 90,
                })
                .build()

            map.statData().setData(mixedNUTS)
            map2.statData().setData(mixedNUTS)
            // setTimeout(() => {
            //     map.exportMapToSVG()
            //     map2.exportMapToSVG()
            // }, 2000)
        </script>
    </body>
</html>
