<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <style>
            /* country boundaries */
            #map2 .em-cntbn {
                stroke: #000000;
                stroke-width: 0.5px;
                opacity: 0.9;
            }

            /* country boundary halo (not coastline) */
            #map2 .em-cntbn-halo:not(.em-bn-co) {
                stroke: white;
                stroke-width: 2px;
                opacity: 0.9;
            }
        </style>
    </head>

    <body>
        <svg id="map"></svg>
        <svg id="map2"></svg>
        <script src="../build/eurostatmap.js"></script>

        <script>
            const nutsLevel = 3
            const map = eurostatmap
                .map('choropleth')
                .scale('20M')
                .nutsLevel(nutsLevel)
                .title('style 1')
                //.stat({ eurostatDatasetCode: 'demo_r_d3dens', unitText: 'people/km²', filters: { TIME: '2023' } })
                .stat({ eurostatDatasetCode: 'nama_10r_3gdp', unitText: 'EUR/inhabitant', filters: { unit: 'EUR_HAB', time: '2022' } })
                .zoomExtent([1, 1000])
                .numberOfClasses(4)
                .legend({
                    title: 'Euro per inhabitant',
                    x: 560,
                    y: 90,
                })
                .build()

            const map2 = eurostatmap
                .map('choropleth')
                .svgId('map2')
                .scale('20M')
                .nutsLevel(nutsLevel)
                .title('style 2')
                //.stat({ eurostatDatasetCode: 'demo_r_d3dens', unitText: 'people/km²', filters: { TIME: '2023' } })
                .stat({ eurostatDatasetCode: 'nama_10r_3gdp', unitText: 'EUR/inhabitant', filters: { unit: 'EUR_HAB', time: '2022' } })
                .zoomExtent([1, 1000])
                .numberOfClasses(4)
                .legend({
                    title: 'Euro per inhabitant',
                    x: 560,
                    y: 90,
                })
                .build()

            setTimeout(() => {
                map.exportMapToSVG()
                map2.exportMapToSVG()
            }, 2000)
        </script>
    </body>
</html>
