<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>eurostat-map.js</title>
        <style>
            .em-zoom-buttons {
                transform: translate(95%, 89%) !important;
            }
        </style>
    </head>

    <body>
        <div style="margin-bottom: 8px">
            <label for="composition-type-select">Composition type:</label>
            <select id="composition-type-select">
                <option value="flag" selected>flag</option>
                <option value="pie">pie</option>
                <option value="ring">ring</option>
                <option value="segment">segment</option>
                <option value="radar">radar</option>
                <option value="agepyramid">agepyramid</option>
                <option value="halftone">halftone</option>
            </select>
        </div>
        <svg id="map"></svg>
        <script src="../../../build/eurostatmap.js"></script>

        <script>
            const map = eurostatmap
                .map('pie')
                .dorling(true) // Enable Dorling cartogram
                .title('Tourism')
                .subtitle('Nights spent in tourist accommodation and share of foreign tourists, 2022')
                .scale('60M')
                .compositionSettings({
                    type: 'pie',
                    minSize: 6,
                    offsetAngle: 90,
                })
                .nutsLevel(2)
                .showZoomButtons(true)
                .insetsButton(true)
                .insetBoxPosition([570, 60])
                .insetsButtonPosition([750, 10])
                .insets('default')
                .transitionDuration(500)
                .geoCenter([5000000, 3500000])
                .statPie({
                    eurostatDatasetCode: 'tour_occ_nin2',
                    filters: { unit: 'NR', time: '2022', nace_r2: 'I551-I553' },
                    unitText: 'nights spent',
                    categoryParameter: 'c_resid', //parameter that the categories belong to
                    categoryCodes: ['FOR', 'DOM'], //category codes
                    categoryLabels: ['Foreign', 'Domestic'], //category labels
                    categoryColors: ['#7fc97f', '#beaed4', '#666666'], //colours
                    //'TOTAL' //code for the total (not necessary here because there is no 'other' category)
                })

                .legend({
                    x: 10,
                    y: 120,
                    boxOpacity: 0.5,
                    titleFontWeight: 'bold',
                    sizeLegend: {
                        title: 'Nights spent',
                        titlePadding: 20,
                    },
                    colorLegend: {
                        title: 'Tourist origin',
                    },
                })

            map.build()

            const typeSelect = document.getElementById('composition-type-select')
            typeSelect.addEventListener('change', (event) => {
                const selectedType = event.target.value
                map.compositionSettings({ type: selectedType })
                map.updateStyle()
            })
        </script>
    </body>
</html>
