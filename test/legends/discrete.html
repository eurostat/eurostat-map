<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    </head>

    <body>
        <svg id="map"></svg>
        <svg id="ps-map"></svg>
        <script src="../../../build/eurostatmap.js"></script>
        <script src="https://d3js.org/d3.v7.min.js"></script>

        <script>
            const customColorFunction = d3.scaleDiverging().domain([-109, 0, 64]).interpolator(d3.interpolateRdBu)
            const map = eurostatmap
                .map('choropleth')
                .title('discrete color scheme legend')
                .subtitle('discrete color scheme')
                .nutsLevel('mixed')
                .zoomExtent([1, 1000])
                .classificationMethod('quantile')
                .legend({
                    title: 'Population change',
                    subtitle: 'per 1000 inhabitants',
                    x: 560,
                    y: 10,
                    width: 200,
                    boxOpacity: 1,
                    noDataText: 'Data not available',
                    maxMin: true,
                    maxMinRegionLabels: true,
                    orientation: 'horizontal', //TODO
                })
                .build()

            map.statData().setData({
                LB: 1.0,
                ES: 0,
                FR: ':',
                DE: 3.2,
                IT: 4.5,
                LI: 10.5,
                CZ: 6.0,
                CH: 7.0,
                UK: 8.0,
                NO: 9.0,
                NL: 10.0,
                PL: 11.0,
                RO: 7.0,
                DE11: 16.0,
            })

            const propSymbol = eurostatmap
                .map('ps')
                .svgId('ps-map')
                .nutsLevel(2)
                .scale('60M')
                .title('Total population and popualtion change')
                .subtitle('2022')
                .width(800)
                .stat('symbolSize', {
                    eurostatDatasetCode: 'demo_r_pjanaggr3',
                    unitText: 'people',
                    filters: {
                        TIME: '2021',
                        SEX: 'T', // Total
                        AGE: 'TOTAL', // All ages
                    },
                })
                .encoding('size', { stat: 'symbolSize' })
                .stat('symbolColor', {
                    eurostatDatasetCode: 'demo_r_gind3',
                    filters: { indic_de: 'GROWRT', time: 2022 },
                    unitText: '‰',
                })
                .encoding('color', { stat: 'symbolColor' })
                .legend({
                    x: 590,
                    y: 20,
                    boxOpacity: 1,
                    sizeLegend: { title: 'Population', values: [10000000, 1000000] },
                    colorLegend: {
                        title: 'Population change',
                        //labels: ['< 10k', '10k - 20k', '20k - 30k', '30k - 40k', '> 40k'].reverse(),
                    },
                })
                .psClassificationMethod('threshold')
                .psThresholds([-10, -5, 0, 5, 10])
                .psColors(['#d73027', '#fc8d59', '#fee08b', '#d9ef8b', '#91cf60', '#1a9850'])
                .psShape('circle')
                .psMaxSize(15)
                .transitionDuration(900)
                .dorling(true)
                .dorlingStrength({ x: 0.1, y: 0.1 })
                .dorlingIterations(1)
                .animateDorling(true) // Set to false for non-animated dorling cartograms
                .dorlingWorker(false) // You can use a web worker for (non-animated) dorling cartograms in order to not block the main thread
                //.dorlingWorkerD3URL('https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js') // Use this in case you need its D3 dependency to be internally hosted.
                .onDorlingProgress(function (progress, map) {
                    console.log('Dorling progress:', progress)
                })
                .insets(false)
                .build()
        </script>
    </body>
</html>
