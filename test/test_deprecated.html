<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    </head>

    <body>
        <svg id="map1"></svg>
        <script src="../build/eurostatmap.js"></script>
        <script>
            const map = eurostatmap
                .map('ch')
                .svgId('map1')
                .zoomExtent([1, 20])
                .title('Population Density in Europe')
                //.insets("default")
                .width(1000)
                .scale('20M')
                .nutsLvl(1)
                // .colorFun(d3.interpolateBlues)
                .classifMethod('threshold')
                .threshold([50, 75, 100, 150, 300, 850])
                .tooltipShowFlags(false)
                .legend({ title: 'test', labelDecNb: 0, x: 15, y: 160 })
                //styling
                .lg('en')
                .seaFillStyle('aliceblue')
                .drawCoastalMargin(false)
                .nutsbnStroke({ 0: 'black', 1: 'grey', 2: 'grey', 3: 'grey', oth: 'lightgrey', co: 'black' })
                .graticuleStroke('lightgrey')
                .graticuleStrokeWidth(0.4)
                .countriesToShow(['ES'])
                .labelling(true)
                .labelsToShow(['seas', 'values', 'cc'])
                .labelValuesFontSize(10)
                .labelFill({ seas: '#012a7c', countries: 'black' })
                .labelShadow(true)
                .labelShadowsToShow(['cc', 'values'])
                .labelShadowWidth({
                    cc: 5,
                    values: 2,
                })
                .nutsbnStrokeWidth({ 0: 1, 1: 0.4, 2: 0.4, 3: 0.4, oth: 0, co: 0.4 })
                .drawGraticule(false)
                .frameStrokeWidth(0)
                .cntrgFillStyle('white')
                .cntbnStroke({ eu: 'red', efta: 'blue', cc: 'orange', oth: 'purple' })
                .cntbnStrokeWidth({ eu: 0.5, efta: 0.5, cc: 0.5, oth: 0.5, co: 0.5 })
                .nutsbnStroke({
                    0: 'grey',
                    1: '#ffffff',
                    2: '#ffffff',
                    3: '#ffffff',
                    co: 'lightgrey',
                })
                .nutsbnStrokeWidth({
                    0: 0.5,
                    1: 0.5,
                    2: 0.5,
                    3: 0.5,
                    co: 0.5,
                })
                .transitionDuration(0)
                .nutsrgFillStyle('blue')

                .build()
        </script>
    </body>
</html>
