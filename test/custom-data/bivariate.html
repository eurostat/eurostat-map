<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Custom Data — Bivariate Choropleth</title>
    </head>
    <body>
        <svg id="map"></svg>
        <script src="../../build/eurostatmap.js"></script>
        <script>
            // v1: Made-up GDP per capita (€ thousands)
            const gdpPerCapita = {
                BE: 42,
                BG: 11,
                CZ: 26,
                DK: 58,
                DE: 47,
                EE: 22,
                IE: 78,
                EL: 16,
                ES: 28,
                FR: 40,
                HR: 17,
                IT: 32,
                CY: 24,
                LV: 19,
                LT: 21,
                LU: 115,
                HU: 18,
                MT: 30,
                NL: 52,
                AT: 49,
                PL: 17,
                PT: 23,
                RO: 14,
                SI: 28,
                SK: 20,
                FI: 46,
                SE: 53,
                NO: 89,
                CH: 88,
            }

            // v2: Made-up life expectancy (years)
            const lifeExpectancy = {
                BE: 81.5,
                BG: 74.2,
                CZ: 79.0,
                DK: 81.3,
                DE: 81.1,
                EE: 78.5,
                IE: 82.4,
                EL: 81.0,
                ES: 83.5,
                FR: 82.9,
                HR: 78.2,
                IT: 83.1,
                CY: 82.7,
                LV: 75.8,
                LT: 76.1,
                LU: 82.8,
                HU: 76.4,
                MT: 82.9,
                NL: 82.3,
                AT: 81.8,
                PL: 77.3,
                PT: 81.4,
                RO: 75.3,
                SI: 81.3,
                SK: 77.8,
                FI: 81.7,
                SE: 82.6,
                NO: 83.2,
                CH: 83.8,
            }

            const n = 4
            // Build a 4×4 bivariate color grid (blue × orange)
            const blues = ['#d0e8f0', '#7dbcd8', '#3a8dc0', '#0d4b80']
            const oranges = ['#fde8c8', '#f9b66d', '#e87d1a', '#9e4a00']
            function mixColors(hex1, hex2) {
                const parse = (h) => ({ r: parseInt(h.slice(1, 3), 16), g: parseInt(h.slice(3, 5), 16), b: parseInt(h.slice(5, 7), 16) })
                const a = parse(hex1),
                    b = parse(hex2)
                const r = Math.round(Math.sqrt((a.r ** 2 + b.r ** 2) / 2))
                const g = Math.round(Math.sqrt((a.g ** 2 + b.g ** 2) / 2))
                const bl = Math.round(Math.sqrt((a.b ** 2 + b.b ** 2) / 2))
                return `rgb(${r},${g},${bl})`
            }
            const colorGrid = blues.map((b) => oranges.map((o) => mixColors(b, o)))

            const map = eurostatmap
                .map('bivariateChoropleth')
                .nutsLevel(0)
                .title('GDP per Capita vs Life Expectancy')
                .subtitle('Made-up data')
                .scale('60M')
                .numberOfClasses(n)
                .classToFillStyle((c1, c2) => {
                    if (c1 == null || c2 == null || c1 === ':' || c2 === ':') return null
                    return colorGrid[c1]?.[c2] ?? '#ccc'
                })
                .insets('default')
                .legend({
                    x: 10,
                    y: 160,
                    label1: 'GDP per capita →',
                    label2: 'Life expectancy →',
                })
                .stat('gdpPerCapita', { customData: gdpPerCapita, unitText: '€ thousands' })
                .encoding('x', { stat: 'gdpPerCapita' })
                .stat('lifeExpectancy', { customData: lifeExpectancy, unitText: 'years' })
                .encoding('y', { stat: 'lifeExpectancy' })

            map.build()
        </script>
    </body>
</html>
