<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    </head>

    <body>
        <svg id="map"></svg>
        <script src="../../../build/eurostatmap.js"></script>

        <script>
            const capitals = [
                { x: 2.35, y: 48.85, label: 'Paris' },
                { x: 13.41, y: 52.52, label: 'Berlin' },
                { x: -0.12, y: 51.5, label: 'London' },
                { x: 12.5, y: 41.9, label: 'Rome' },
                { x: -3.7, y: 40.42, label: 'Madrid' },
                { x: 4.35, y: 50.85, label: 'Brussels' },
                { x: 18.91, y: 47.49, label: 'Budapest' },
                { x: 21.01, y: 52.23, label: 'Warsaw' },
                { x: 14.42, y: 50.09, label: 'Prague' },
                { x: 16.37, y: 48.21, label: 'Vienna' },
            ]

            const map = eurostatmap
                .map('choropleth')
                .nutsLevel(2)
                .title('Population density, 2023')
                .stat({ eurostatDatasetCode: 'demo_r_d3dens', unitText: 'people/km²', filters: { TIME: '2023' } })
                .zoomExtent([1, 1000])
                .build()

            map.callback(() => {
                capitals.forEach((c) =>
                    map.addLocation({
                        ...c,
                        shape: 'star',
                        fill: '#FFD700',
                        stroke: '#333',
                        strokeWidth: 1,
                        radius: 7,
                    })
                )
            })
        </script>
    </body>
</html>
