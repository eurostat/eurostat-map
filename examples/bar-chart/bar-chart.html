<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Bar Chart Map</title>
        <style>
            .em-grid-rect,
            .em-grid-hexagon {
                fill: white;
                stroke: #dfdfdf !important;
            }
        </style>
    </head>
    <body>
        <label for="bartype">Bar type:</label>
        <select id="bartype">
            <option value="grouped" selected>Grouped (vertical)</option>
            <option value="stacked">Stacked (horizontal)</option>
        </select>
        <br />
        <fieldset style="display: inline-block; margin-top: 8px">
            <legend>NUTS level</legend>
            <label>
                <input type="radio" name="nuts-level" value="0" checked />
                0
            </label>
            <label>
                <input type="radio" name="nuts-level" value="1" />
                1
            </label>
            <label>
                <input type="radio" name="nuts-level" value="2" />
                2
            </label>
            <label>
                <input type="radio" name="nuts-level" value="3" />
                3
            </label>
        </fieldset>
        <br />
        <label>
            <input type="checkbox" id="grid-cartogram-toggle" />
            Grid cartogram (NUTS 0 only)
        </label>
        <br />
        <svg id="map"></svg>

        <!-- <script src="../../build/eurostatmap.js"></script> -->
        <script src="../../build/eurostatmap.js"></script>
        <script>
            let map

            function buildMap(barType, nutsLevel, useGridCartogram) {
                if (map) map.svg().selectAll('*').remove()

                const shouldUseGridCartogram = useGridCartogram && nutsLevel === 0

                let mapBuilder = eurostatmap
                    .map('bar')
                    .svgId('map')
                    .title('Tourism nights spent by residence of guest')
                    .subtitle(`NUTS ${nutsLevel}, 2022`)
                    .nutsLevel(nutsLevel)
                    .scale('20M')
                    .barType(barType)
                    // Stacked sizing
                    // .barMinWidth(6)
                    // .barMaxWidth(70)
                    .barHeight(10)
                    // Grouped sizing
                    .barGroupWidth(8)
                    .barGroupGap(0)
                    .barGroupMaxHeight(40)
                    .stat('composition', {
                        eurostatDatasetCode: 'tour_occ_nin2',
                        filters: { unit: 'NR', time: '2022', nace_r2: 'I551-I553' },
                        unitText: 'Nights',
                        categoryParameter: 'c_resid',
                        categoryCodes: ['FOR', 'DOM'],
                        categoryLabels: ['Foreign', 'Domestic'],
                        categoryColors: ['#7fc97f', '#beaed4'],
                    })
                    .encoding('composition', { stat: 'composition' })
                    .legend({
                        x: 570,
                        y: 0,
                        sizeLegend: {
                            title: 'Total nights spent',
                            titlePadding: 15,
                            offsetX: 14,
                            cells: 2,
                        },
                        colorLegend: {
                            title: 'Residence of guest',
                            marginTop: 30,
                            noData: false,
                        },
                    })

                if (shouldUseGridCartogram) {
                    mapBuilder = mapBuilder.gridCartogram(true).gridCartogramSettings({ chartOffset: { x: 0, y: 20 } })
                }

                map = mapBuilder

                map.build()
            }

            function getSelectedNutsLevel() {
                const selected = document.querySelector('input[name="nuts-level"]:checked')
                return Number(selected.value)
            }

            function getSelectedBarType() {
                return document.getElementById('bartype').value
            }

            function isGridCartogramEnabled() {
                return document.getElementById('grid-cartogram-toggle').checked
            }

            function updateGridCartogramToggleState() {
                const toggle = document.getElementById('grid-cartogram-toggle')
                const isNuts0 = getSelectedNutsLevel() === 0
                toggle.disabled = !isNuts0
            }

            updateGridCartogramToggleState()
            buildMap(getSelectedBarType(), getSelectedNutsLevel(), isGridCartogramEnabled())

            document.getElementById('bartype').addEventListener('change', function (e) {
                buildMap(e.target.value, getSelectedNutsLevel(), isGridCartogramEnabled())
            })

            document.querySelectorAll('input[name="nuts-level"]').forEach((radio) => {
                radio.addEventListener('change', function () {
                    updateGridCartogramToggleState()
                    buildMap(getSelectedBarType(), Number(this.value), isGridCartogramEnabled())
                })
            })

            document.getElementById('grid-cartogram-toggle').addEventListener('change', function () {
                buildMap(getSelectedBarType(), getSelectedNutsLevel(), this.checked)
            })
        </script>
    </body>
</html>
