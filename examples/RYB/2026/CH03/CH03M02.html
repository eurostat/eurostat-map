<!doctype html>
<html lang="en">
    <head>
        <title>Regional Yearbook 2026 CH03M02</title>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="../../insets/insets.css" />
        <link rel="stylesheet" href="../../styles.css" />
        <link rel="stylesheet" href="../../insets/insets.css" />
    </head>

    <body>
        <style>
            .em-zoom-buttons {
                transform: translate(1%, 15%);
                display: none;
            }
            .em-legend-subtitle {
                font-size: 12px;
            }
            #legend-container {
                transform: translate(826px, 73px);
                filter: drop-shadow(0px 1px 1px rgba(0, 0, 0, 0.3));
            }
            #newInsets {
                filter: drop-shadow(0px 1px 1px rgba(0, 0, 0, 0.3));
            }
            .em-ternary-center-line {
                opacity: 0.7;
                stroke: black;
            }
            #em-ternary-axis-title-1,
            #em-ternary-axis-title-1-badge {
                transform: translate(0px, 6px);
            }
            .map-controls {
                display: grid;
                grid-template-columns: auto 280px auto;
                align-items: center;
                column-gap: 12px;
                row-gap: 8px;
                margin-top: 12px;
                padding-left: 12px;
                font-family: Arial, sans-serif;
                font-size: 14px;
            }
            .map-controls input[type='range'] {
                width: 280px;
            }
            .map-controls-output {
                min-width: 54px;
                font-variant-numeric: tabular-nums;
            }
        </style>
        <div>
            <button id="export-png-btn" type="button">Download map as PNG</button>
            <button id="export-svg-btn" type="button">Download map as SVG</button>
            <button id="export-legend-btn" type="button">Download legend as SVG</button>
        </div>
        <svg id="container" width="100%" height="820px">
            <svg id="map"></svg>
            <g id="newInsets"></g>
            <svg id="legend-container"></svg>
        </svg>
        <div class="map-controls">
            <label for="hue-slider">Hue</label>
            <input id="hue-slider" type="range" min="0" max="360" step="1" value="160" />
            <output id="hue-slider-value" class="map-controls-output" for="hue-slider">160</output>

            <label for="breaks-slider">Breaks</label>
            <input id="breaks-slider" type="range" min="3" max="60" step="1" value="29" />
            <output id="breaks-slider-value" class="map-controls-output" for="breaks-slider">29</output>

            <label for="spread-slider">Spread</label>
            <input id="spread-slider" type="range" min="0" max="8" step="0.1" value="3.5" />
            <output id="spread-slider-value" class="map-controls-output" for="spread-slider">3.5</output>
        </div>
        <script src="../../../../build/eurostatmap.js"></script>
        <script src="https://unpkg.com/d3@7"></script>
        <script src="../../insets/overseas.js"></script>
        <script src="../../export.js"></script>
        <script type="module">
            import { json } from 'https://cdn.jsdelivr.net/npm/d3-fetch@3/+esm'

            // Generate fresh inset config with new svgIds (from overseas.js)
            const insetsCfg = createOutermostInsetsConfig()
            const insetBoxPosition = [545, 78]
            createInsetDOMElements(document.getElementById('newInsets'), insetsCfg, insetBoxPosition)

            //get data
            const [bachelor, masters, phd] = await Promise.all([json('./data/bachelors.json'), json('./data/masters.json'), json('./data/phd.json')])

            const red = '#E04040'
            const blue = '#388AE2'
            const green = '#33A033'

            const legendLabelPosition = 'edge' // 'corner' | 'inside'
            const legendColorTarget = 'points' // 'points' | 'triangles'
            const meanCentering = true
            const initialHue = 160
            const initialBreaks = 29
            const initialSpread = 3.5

            const MAPWIDTH = 797
            const MAPHEIGHT = 677

            const map = eurostatmap
                .map('trivariateChoropleth')
                .insets(insetsCfg)
                .containerId('container')
                .footer(true)
                .header(true)
                .insetBoxPosition(insetBoxPosition)
                .position({ x: 4950000, y: 3450000, z: 6000 })
                .footnote(
                    'Note: share of students enrolled in ISCED levels 6, 7 and 8. Germany: NUTS level 1. The Netherlands and Albania: national data. Iceland and Albania: 2023. Liechtenstein and Türkiye: 2022. <br>Source: Eurostat (online data code: educ_uoe_enrt06)'
                )
                .footnoteWrap(85)

                .width(MAPWIDTH)
                .height(MAPHEIGHT)
                .title('Tertiary education students, 2021')
                .subtitle(
                    `<tspan x="14" dy="5"><tspan class="badge-green">Bachelor's</tspan> , <tspan class="badge-blue">Master's</tspan> or <tspan class="badge-red">PhD</tspan> students.</tspan>`
                )
                .nutsLevel(2)
                .ternarySettings({
                    hue: initialHue,
                    chroma: 130,
                    lightness: 50,
                    contrast: 0.3,
                    spread: initialSpread,
                    breaks: initialBreaks,
                    meanCentering: meanCentering,
                    sextant: true,
                })
                .legend({
                    svgId: 'legend-container',
                    title: 'Education level',
                    subtitle: `
                    <tspan x="8" dy="0">Compared to the average...</tspan> 
                        <tspan x="8" dy="1.2em">Areas with more <tspan fill="${green}" class='subtitle-color'>green</tspan> have a higher % of bachelor's students.</tspan>
                        <tspan x="8" dy="1.2em">   Areas with more <tspan fill="${blue}" class='subtitle-color'>blue</tspan> have a higher % of master's students.</tspan>
                        <tspan x="8" dy="1.2em">Areas with more <tspan fill="${red}" class='subtitle-color'>red</tspan> have a higher % of PhD students.</tspan>
                    `,

                    boxOpacity: 0.99,
                    width: 310,
                    height: 300,
                    labels: legendLabelPosition == 'corner' ? ["Bachelor's", "Master's", 'PhD'] : ["← Bachelor's", "Master's →", 'PhD →'],
                    labelPosition: legendLabelPosition,
                    padding: { top: 15, right: 30, bottom: 0, left: 47 },
                    showLines: true,
                    gridBreaks: 5,
                    minorSubdivisions: 2,
                    showCenter: meanCentering,
                    centerLabel: 'Average',
                    showData: true,
                    colorTarget: legendColorTarget, // 'points' | 'triangles'
                    centerAnnotationOffsets: {
                        labelX: -35,
                        labelY: 140,
                        curveX: 0,
                        curveY: 0,
                    },
                })
                .zoomButtons(false)
                .zoomButtonsPosition([740, 590])
                .zoomExtent([0.9, 100])

            map.onBuild(() => {
                //add footnote

                d3.select('#map #em-footnote-2').remove()
                d3.selectAll('#map')
                    .append('text')
                    .attr('x', MAPWIDTH - 310)
                    .attr('y', MAPHEIGHT + 92)
                    .attr('class', 'em-footnote')
                    .attr('id', 'em-footnote-2')
                    .html('Cartography: GISCO. Boundaries: ©EuroGeographics ©OSM')

                const newInsets = d3.select('#newInsets')
                if (!newInsets.empty()) {
                    d3.select('#map').node().appendChild(newInsets.node())
                }

                const badges = [
                    { cls: 'badge-green', color: green },
                    { cls: 'badge-blue', color: blue },
                    { cls: 'badge-red', color: red },
                ]

                // subtitle badges (inside #map SVG)
                const svgEl = document.querySelector('#' + map.svgId_)
                if (svgEl) {
                    const subtitle = svgEl.querySelector('.em-subtitle')
                    if (subtitle) {
                        badges.forEach(({ cls, color }) => {
                            const tspan = subtitle.querySelector('.' + cls)
                            if (!tspan) return
                            applyBadgeToElement(tspan, color)
                        })
                    }
                }

                // axis title badges (inside #legend-container SVG)
                const legendSvgEl = document.querySelector('#legend-container')
                if (legendSvgEl) {
                    legendSvgEl.querySelectorAll('.em-ternary-axis-title').forEach((el, i) => {
                        applyBadgeToElement(el, badges[i].color)
                    })

                    //legend average indicator badges
                    // legendSvgEl.querySelectorAll('.em-ternary-center-line-label').forEach((el, i) => {
                    //     applyBadgeToElement(el, badges[i].color)
                    // })
                }
            })

            map.stat('v1', { label: 'Bachelor', unitText: '%' })
                .stat('v2', { label: 'Master', unitText: '%' })
                .stat('v3', { label: 'PhD', unitText: '%' })
            map.build()
            map.statData('v1').setData(filterNulls(bachelor))
            map.statData('v2').setData(filterNulls(masters))
            map.statData('v3').setData(filterNulls(phd))

            // map.updateStatValues()

            function filterNulls(obj) {
                return Object.fromEntries(Object.entries(obj).filter(([_, v]) => v !== null))
            }

            function applyBadgeToElement(el, color) {
                const textEl = el.closest('text')
                const bb = el.getBBox()
                const pad = { x: 3, y: 2 }

                const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect')

                const badgeId = el.getAttribute('id') || textEl?.getAttribute('id')
                if (badgeId) {
                    rect.setAttribute('id', `${badgeId}-badge`)
                }

                rect.setAttribute('x', bb.x - pad.x)
                rect.setAttribute('y', bb.y - pad.y)
                rect.setAttribute('width', bb.width + pad.x * 2)
                rect.setAttribute('height', bb.height + pad.y * 2)
                rect.setAttribute('rx', 2)
                rect.setAttribute('fill', color)

                const transforms = [textEl?.getAttribute('transform'), el !== textEl ? el.getAttribute('transform') : null].filter(Boolean)

                if (transforms.length) {
                    rect.setAttribute('transform', transforms.join(' '))
                }

                const insertParent = textEl ? textEl.parentNode : el.parentNode
                const insertBefore = textEl || el

                insertParent.insertBefore(rect, insertBefore)

                el.setAttribute('fill', 'white')
                el.style.fill = 'white'
            }

            const exportBtnPNG = document.getElementById('export-png-btn')
            exportBtnPNG.addEventListener('click', function () {
                const factor = 1
                map.exportMapToPNG(MAPWIDTH * factor, MAPHEIGHT + 120 * factor) // width, height, scale (for better quality)
            })

            const exportBtnSVG = document.getElementById('export-svg-btn')
            exportBtnSVG.addEventListener('click', function () {
                map.exportMapToSVG('CH03M02-map') // filename without extension
            })

            const exportLegendBtn = document.getElementById('export-legend-btn')
            exportLegendBtn.addEventListener('click', function () {
                const legendSVG = document.getElementById('legend-container')
                exportToSVG(legendSVG, 'CH03M02-legend.svg')
            })

            const hueSlider = document.getElementById('hue-slider')
            const hueSliderValue = document.getElementById('hue-slider-value')
            const breaksSlider = document.getElementById('breaks-slider')
            const breaksSliderValue = document.getElementById('breaks-slider-value')
            const spreadSlider = document.getElementById('spread-slider')
            const spreadSliderValue = document.getElementById('spread-slider-value')

            function updateTernaryControls() {
                const hue = Number(hueSlider.value)
                const breaks = Number(breaksSlider.value)
                const spread = Number(spreadSlider.value)

                hueSliderValue.textContent = String(hue)
                breaksSliderValue.textContent = String(breaks)
                spreadSliderValue.textContent = spread.toFixed(1)

                map.ternarySettings({ hue, breaks, spread })
                map.legend({
                    svgId: 'legend-container',
                    title: 'Education level',
                    subtitle: `
                    <tspan x="8" dy="0">Compared to the average...</tspan> 
                        <tspan x="8" dy="1.2em">Areas with more <tspan fill="${green}" class='subtitle-color'>green</tspan> have a higher % of bachelor's students.</tspan>
                        <tspan x="8" dy="1.2em">   Areas with more <tspan fill="${blue}" class='subtitle-color'>blue</tspan> have a higher % of master's students.</tspan>
                        <tspan x="8" dy="1.2em">Areas with more <tspan fill="${red}" class='subtitle-color'>red</tspan> have a higher % of PhD students.</tspan>
                    `,

                    boxOpacity: 0.99,
                    width: 310,
                    height: 300,
                    labels: legendLabelPosition == 'corner' ? ["Bachelor's", "Master's", 'PhD'] : ["← Bachelor's", "Master's →", 'PhD →'],
                    labelPosition: legendLabelPosition,
                    padding: { top: 15, right: 30, bottom: 0, left: 47 },
                    showLines: true,
                    gridBreaks: breaks,
                    minorSubdivisions: 2,
                    showCenter: meanCentering,
                    centerLabel: 'Average',
                    showData: true,
                    colorTarget: legendColorTarget, // 'points' | 'triangles'
                    centerAnnotationOffsets: {
                        labelX: -35,
                        labelY: 140,
                        curveX: 0,
                        curveY: 0,
                    },
                })
                map.updateClassification()
                map.updateStyle()
                map.updateLegend()
                //if (map.legendObj()) map.legendObj().update()
            }

            hueSlider.addEventListener('input', function () {
                updateTernaryControls()
            })

            breaksSlider.addEventListener('input', function () {
                updateTernaryControls()
            })

            spreadSlider.addEventListener('input', function () {
                updateTernaryControls()
            })
        </script>
    </body>
</html>
