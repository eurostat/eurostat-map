<!doctype html>
<html lang="en">
    <head>
        <title>Ternary Choropleth - CH03M02</title>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="../../insets/insets.css" />
        <link rel="stylesheet" href="../../styles.css" />
        <link rel="stylesheet" href="../../insets/insets.css" />
    </head>

    <body>
        <style>
            .em-zoom-buttons {
                transform: translate(1%, 15%);
                display: none;
            }
            .em-legend-subtitle {
                font-size: 12px;
            }
            #legend-container {
                transform: translate(826px, 73px);
                filter: drop-shadow(0px 1px 1px rgba(0, 0, 0, 0.3));
            }
            #newInsets {
                filter: drop-shadow(0px 1px 1px rgba(0, 0, 0, 0.3));
            }
            .em-ternary-center-line {
                opacity: 0.7;
                stroke: black;
            }
            #em-ternary-axis-title-1,
            #em-ternary-axis-title-1-badge {
                transform: translate(0px, 6px);
            }
            .map-controls {
                display: grid;
                grid-template-columns: auto 280px auto;
                align-items: center;
                column-gap: 12px;
                row-gap: 8px;
                margin-top: 12px;
                padding-left: 12px;
                font-family: Arial, sans-serif;
                font-size: 14px;
            }
            .map-controls input[type='range'] {
                width: 280px;
            }
            .map-controls-output {
                min-width: 54px;
                font-variant-numeric: tabular-nums;
            }
            .map-layout {
                display: flex;
                align-items: flex-start;
                gap: 14px;
                flex-wrap: wrap;
            }
            #container {
                width: 860px;
                max-width: 100%;
                flex: 1 1 860px;
            }
            .small-multiples {
                width: 320px;
                display: grid;
                grid-template-columns: 1fr;
                gap: 10px;
                flex: 0 0 320px;
            }
            .small-multiples svg {
                width: 100%;
                height: 248px;
                border: 1px solid #d6d6d6;
                border-radius: 4px;
                background: white;
            }
            .small-multiples .em-source-link,
            .small-multiples .em-footer,
            .small-multiples .em-zoom-buttons {
                display: none;
            }
            @media (max-width: 1260px) {
                .small-multiples {
                    width: 100%;
                    grid-template-columns: repeat(3, minmax(210px, 1fr));
                    flex: 1 1 100%;
                }
            }
            @media (max-width: 900px) {
                .small-multiples {
                    grid-template-columns: 1fr;
                }
            }
            .small-multiples .em-cntbn path,
            .small-multiples .em-cntbn-halo path {
                stroke-width: 0.1px !important;
            }
            .small-multiples .em-nutsbn path {
                opacity: 0.1 !important;
                stroke-width: 0.1px !important;
            }
            .small-multiples .em-nutsrg path {
                stroke-width: 0px !important;
            }
        </style>
        <div>
            <button id="export-png-btn" type="button">Download map as PNG</button>
            <button id="export-svg-btn" type="button">Download map as SVG</button>
            <button id="export-legend-btn" type="button">Download legend as SVG</button>
            <button id="export-small-multiples-btn" type="button">Download small multiples</button>
        </div>
        <div class="map-layout">
            <svg id="container" width="100%" height="820px">
                <svg id="map"></svg>
                <g id="newInsets"></g>
                <svg id="legend-container"></svg>
            </svg>

            <div class="small-multiples">
                <svg id="small-map-v1"></svg>
                <svg id="small-map-v2"></svg>
                <svg id="small-map-v3"></svg>
            </div>
        </div>
        <div class="map-controls">
            <label for="hue-slider">Hue</label>
            <input id="hue-slider" type="range" min="0" max="360" step="1" value="160" />
            <output id="hue-slider-value" class="map-controls-output" for="hue-slider">160</output>

            <label for="chroma-slider">Chroma</label>
            <input id="chroma-slider" type="range" min="0" max="360" step="1" value="130" />
            <output id="chroma-slider-value" class="map-controls-output" for="chroma-slider">130</output>

            <label for="lightness-slider">Lightness</label>
            <input id="lightness-slider" type="range" min="0" max="100" step="1" value="50" />
            <output id="lightness-slider-value" class="map-controls-output" for="lightness-slider">50</output>

            <label for="breaks-slider">Breaks</label>
            <input id="breaks-slider" type="range" min="3" max="60" step="1" value="29" />
            <output id="breaks-slider-value" class="map-controls-output" for="breaks-slider">29</output>

            <label for="spread-slider">Spread</label>
            <input id="spread-slider" type="range" min="0" max="8" step="0.1" value="3.5" />
            <output id="spread-slider-value" class="map-controls-output" for="spread-slider">3.5</output>
        </div>
        <script src="../../../../build/eurostatmap.js"></script>
        <script src="https://unpkg.com/d3@7"></script>
        <script src="../../../../src/lib/tricolore/dist/tricolore.umd.js"></script>
        <script src="../../insets/overseas.js"></script>
        <script src="../../export.js"></script>
        <script type="module">
            import { json } from 'https://cdn.jsdelivr.net/npm/d3-fetch@3/+esm'

            const { tricolore, tricoloreSextant, CompositionUtils } = window.tricolore

            // Generate fresh inset config with new svgIds (from overseas.js)
            const insetsCfg = createOutermostInsetsConfig()
            const insetBoxPosition = [545, 78]
            createInsetDOMElements(document.getElementById('newInsets'), insetsCfg, insetBoxPosition)

            //get data
            const [bachelor, masters, phd] = await Promise.all([json('./data/bachelors.json'), json('./data/masters.json'), json('./data/phd.json')])

            let var1Color = '#33A033'
            let var2Color = '#388AE2'
            let var3Color = '#E04040'

            const legendLabelPosition = 'edge' // 'corner' | 'inside'
            const legendColorTarget = 'points' // 'points' | 'triangles'
            const meanCentering = true
            const initialHue = 160
            const initialLightness = 50
            const initialChroma = 130
            const initialBreaks = 29
            const initialSpread = 3.5

            const MAPWIDTH = 797
            const MAPHEIGHT = 677
            const SMALL_MAP_WIDTH = 320
            const SMALL_MAP_HEIGHT = 278

            const smallMultipleDefinitions = [
                {
                    svgId: 'small-map-v1',
                    title: "Bachelor's",
                    subtitle: '% share, 2024',
                    colorRamp: ['#eff8ef', '#d6ecd7', '#a7d8a8', '#72c374', '#33a033'],
                    data: bachelor,
                },
                {
                    svgId: 'small-map-v2',
                    title: "Master's",
                    subtitle: '% share, 2024',
                    colorRamp: ['#eef4fc', '#d0e1f7', '#a7c9f0', '#6ea6e6', '#388ae2'],
                    data: masters,
                },
                {
                    svgId: 'small-map-v3',
                    title: 'PhD',
                    subtitle: '% share, 2024',
                    colorRamp: ['#fdeeee', '#f8d3d3', '#efa8a8', '#e97575', '#e04040'],
                    data: phd,
                },
            ]

            const map = eurostatmap
                .map('trivariateChoropleth')
                .hoverColor('#FFCC00')
                .insets(insetsCfg)
                .containerId('container')
                .footer(true)
                .header(true)
                .insetBoxPosition(insetBoxPosition)
                .position({ x: 4950000, y: 3440000, z: 5950 })
                .footnote(
                    'Note: share of students enrolled in ISCED levels 6, 7 and 8. Germany: NUTS level 1. The Netherlands and Albania: national data. Iceland and Albania: 2023. Liechtenstein and Türkiye: 2022. <br>Source: Eurostat (online data code: educ_uoe_enrt06)'
                )
                .footnoteWrap(85)

                .width(MAPWIDTH)
                .height(MAPHEIGHT)
                .title('Students enrolled in tertiary education')
                .subtitle('(% of all tertiary students excluding short-cycle tertiary education, by NUTS 2 regions, 2024)')
                // .subtitle(
                //     `<tspan x="14" dy="5"><tspan class="badge-var1">Bachelor's</tspan> , <tspan class="badge-var2">Master's</tspan> or <tspan class="badge-var3">PhD</tspan> students.</tspan>`
                // )
                .nutsLevel('mixed')
                .ternarySettings({
                    hue: initialHue,
                    chroma: initialChroma,
                    lightness: initialLightness,
                    contrast: 0.3,
                    spread: initialSpread,
                    breaks: initialBreaks,
                    meanCentering: meanCentering,
                    //sextant: true,
                })
                .legend({
                    svgId: 'legend-container',
                    title: 'Education level',
                    subtitle: getLegendSubtitle(),

                    boxOpacity: 0.99,
                    width: 310,
                    height: 300,
                    labels: legendLabelPosition == 'corner' ? ["Bachelor's", "Master's", 'PhD'] : ["← Bachelor's", "Master's →", 'PhD →'],
                    labelPosition: legendLabelPosition,
                    padding: { top: 15, right: 30, bottom: 0, left: 47 },
                    showLines: true,
                    gridBreaks: 5,
                    minorSubdivisions: 2,
                    showCenter: meanCentering,
                    centerLabel: 'Average',
                    showData: true,
                    colorTarget: legendColorTarget, // 'points' | 'triangles'
                    centerAnnotationOffsets: {
                        labelX: -35,
                        labelY: 140,
                        curveX: 0,
                        curveY: 0,
                    },
                })
                .zoomButtons(false)
                .zoomButtonsPosition([740, 590])
                .zoomExtent([0.9, 100])

            map.onBuild(() => {
                //add footnote

                d3.select('#map #em-footnote-2').remove()
                d3.select('#map')
                    .append('text')
                    .attr('x', MAPWIDTH - 272)
                    .attr('y', MAPHEIGHT + 90)
                    .attr('class', 'em-footnote')
                    .attr('id', 'em-footnote-2')
                    .html('Administrative Boundaries: ©EuroGeographics ©OSM')

                d3.select('#map')
                    .append('text')
                    .attr('x', MAPWIDTH - 209)
                    .attr('y', MAPHEIGHT + 103)
                    .attr('class', 'em-footnote')
                    .attr('id', 'em-footnote-2')
                    .html('Cartography: Eurostat – GISCO, 06/2026')

                const newInsets = d3.select('#newInsets')
                if (!newInsets.empty()) {
                    d3.select('#map').node().appendChild(newInsets.node())
                }

                refreshBadgeColors()
            })

            map.stat('v1', { label: 'Bachelor', unitText: '%' })
                .stat('v2', { label: 'Master', unitText: '%' })
                .stat('v3', { label: 'PhD', unitText: '%' })
            map.build()
            map.statData('v1').setData(filterNulls(bachelor))
            map.statData('v2').setData(filterNulls(masters))
            map.statData('v3').setData(filterNulls(phd))

            buildSmallMultipleMaps()

            // map.updateStatValues()

            function getTernaryCenter() {
                const stat1 = map.statData('v1').get() || {}
                const stat2 = map.statData('v2').get() || {}
                const stat3 = map.statData('v3').get() || {}
                const compositions = []

                Object.keys(stat1).forEach((id) => {
                    const v1 = +stat1[id]?.value
                    const v2 = +stat2[id]?.value
                    const v3 = +stat3[id]?.value

                    if (Number.isFinite(v1) && Number.isFinite(v2) && Number.isFinite(v3) && v1 + v2 + v3 > 0) {
                        compositions.push([v1, v2, v3])
                    }
                })

                if (!meanCentering || compositions.length === 0) {
                    return [1 / 3, 1 / 3, 1 / 3]
                }

                return CompositionUtils.centre(compositions)
            }

            function updateExtremeColors() {
                const ternarySettings = map.ternarySettings()
                const center = getTernaryCenter()
                const extremePoints = [
                    [1, 0, 0],
                    [0, 1, 0],
                    [0, 0, 1],
                ]

                const colors = ternarySettings.sextant
                    ? tricoloreSextant(extremePoints, {
                          center,
                          values: ternarySettings.sextantColors,
                      })
                    : tricolore(extremePoints, {
                          center,
                          breaks: ternarySettings.breaks,
                          hue: ternarySettings.hue,
                          chroma: ternarySettings.chroma,
                          lightness: ternarySettings.lightness,
                          contrast: ternarySettings.contrast,
                          spread: ternarySettings.spread,
                      })

                ;[var1Color, var2Color, var3Color] = colors.map((color, index) => color || [var1Color, var2Color, var3Color][index])
            }

            function getLegendSubtitle() {
                return `
                    <tspan x="8" dy="0">Compared to the average...</tspan> 
                        <tspan x="8" dy="1.2em">Areas with more   <tspan class="badge-legend-var1">green</tspan>  have a higher % of bachelor's students.</tspan>
                        <tspan x="8" dy="1.2em">Areas with more   <tspan class="badge-legend-var2">blue</tspan>  have a higher % of master's students.</tspan>
                        <tspan x="8" dy="1.2em">Areas with more   <tspan class="badge-legend-var3">red</tspan>  have a higher % of PhD students.</tspan>
                    `
            }

            function getLegendConfig() {
                return {
                    svgId: 'legend-container',
                    title: 'Education level',
                    subtitle: getLegendSubtitle(),
                    boxOpacity: 0.99,
                    width: 310,
                    height: 300,
                    labels: legendLabelPosition == 'corner' ? ["Bachelor's", "Master's", 'PhD'] : ["← Bachelor's", "Master's →", 'PhD →'],
                    labelPosition: legendLabelPosition,
                    padding: { top: 15, right: 30, bottom: 0, left: 47 },
                    showLines: true,
                    gridBreaks: 5,
                    minorSubdivisions: 2,
                    showCenter: meanCentering,
                    centerLabel: 'Average',
                    showData: true,
                    colorTarget: legendColorTarget,
                    centerAnnotationOffsets: {
                        labelX: -35,
                        labelY: 140,
                        curveX: 0,
                        curveY: 0,
                    },
                }
            }

            function refreshBadgeColors() {
                updateExtremeColors()

                document.querySelectorAll('.em-generated-badge').forEach((el) => el.remove())

                const badges = [
                    { cls: 'badge-var1', color: var1Color },
                    { cls: 'badge-var2', color: var2Color },
                    { cls: 'badge-var3', color: var3Color },
                ]

                const svgEl = document.querySelector('#' + map.svgId_)
                if (svgEl) {
                    const subtitle = svgEl.querySelector('.em-subtitle')
                    if (subtitle) {
                        badges.forEach(({ cls, color }) => {
                            const tspan = subtitle.querySelector('.' + cls)
                            if (!tspan) return
                            applyBadgeToElement(tspan, color)
                        })
                    }
                }

                const legendSvgEl = document.querySelector('#legend-container')
                if (legendSvgEl) {
                    const legendSubtitle = legendSvgEl.querySelector('.em-legend-subtitle')
                    if (legendSubtitle) {
                        badges.forEach(({ cls, color }) => {
                            const legendBadgeClass = cls.replace('badge-', 'badge-legend-')
                            const tspan = legendSubtitle.querySelector('.' + legendBadgeClass)
                            if (!tspan) return
                            applyBadgeToElement(tspan, color, { x: 2, y: 1 })
                        })
                    }

                    legendSvgEl.querySelectorAll('.em-ternary-axis-title').forEach((el, i) => {
                        applyBadgeToElement(el, badges[i].color)
                    })
                }
            }

            function filterNulls(obj) {
                return Object.fromEntries(Object.entries(obj).filter(([_, v]) => v !== null))
            }

            function buildSmallMultipleMaps() {
                smallMultipleDefinitions.forEach((config) => {
                    const smallMap = eurostatmap
                        .map('choropleth')
                        .svgId(config.svgId)
                        .width(SMALL_MAP_WIDTH)
                        .height(SMALL_MAP_HEIGHT)
                        .nutsLevel('mixed')
                        .nutsYear(2024)
                        .position({ x: 4950000, y: 3200000, z: 16500 })
                        .title(config.title)
                        .titlePosition([5, 20])
                        //.subtitle(config.subtitle)
                        .header(false)
                        .footer(false)
                        .showSourceLink(false)
                        .zoomButtons(false)
                        .hoverColor('#FFCC00')
                        .classificationMethod('quantile')
                        .makeClassifNice(false)
                        .numberOfClasses(config.colorRamp.length)
                        .colors(config.colorRamp)
                        .legend({
                            x: SMALL_MAP_WIDTH - 80,
                            y: 6,
                            title: '%',
                            titlePadding: -10,
                            noData: false,
                            noDataText: 'No data',
                            boxOpacity: 0.94,
                        })

                    smallMap.build()
                    smallMap.statData().setData(filterNulls(config.data))
                })
            }

            function buildSmallMultiplesExportSVG() {
                const container = document.querySelector('.small-multiples')
                if (!container) return null

                const sourceSvgs = Array.from(container.querySelectorAll('svg'))
                if (!sourceSvgs.length) return null

                const SVG_NS = 'http://www.w3.org/2000/svg'
                const containerRect = container.getBoundingClientRect()
                const width = Math.ceil(containerRect.width)
                const height = Math.ceil(containerRect.height)

                const exportSvg = document.createElementNS(SVG_NS, 'svg')
                exportSvg.setAttribute('width', width)
                exportSvg.setAttribute('height', height)
                exportSvg.setAttribute('viewBox', `0 0 ${width} ${height}`)

                sourceSvgs.forEach((sourceSvg) => {
                    const rect = sourceSvg.getBoundingClientRect()
                    const x = rect.left - containerRect.left
                    const y = rect.top - containerRect.top

                    const clonedSvg = sourceSvg.cloneNode(true)
                    clonedSvg.setAttribute('x', `${x}`)
                    clonedSvg.setAttribute('y', `${y}`)
                    clonedSvg.setAttribute('width', `${Math.ceil(rect.width)}`)
                    clonedSvg.setAttribute('height', `${Math.ceil(rect.height)}`)

                    exportSvg.appendChild(clonedSvg)
                })

                return exportSvg
            }

            function applyBadgeToElement(el, color, pad = { x: 3, y: 2 }) {
                const textEl = el.closest('text')
                const bb = el.getBBox()

                const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect')

                const badgeId = el.getAttribute('id') || textEl?.getAttribute('id')
                if (badgeId) {
                    rect.setAttribute('id', `${badgeId}-badge`)
                }

                rect.setAttribute('class', 'em-generated-badge')

                rect.setAttribute('x', bb.x - pad.x)
                rect.setAttribute('y', bb.y - pad.y)
                rect.setAttribute('width', bb.width + pad.x * 2)
                rect.setAttribute('height', bb.height + pad.y * 2)
                rect.setAttribute('rx', 2)
                rect.setAttribute('fill', color)

                const transforms = [textEl?.getAttribute('transform'), el !== textEl ? el.getAttribute('transform') : null].filter(Boolean)

                if (transforms.length) {
                    rect.setAttribute('transform', transforms.join(' '))
                }

                const insertParent = textEl ? textEl.parentNode : el.parentNode
                const insertBefore = textEl || el

                insertParent.insertBefore(rect, insertBefore)

                el.setAttribute('fill', 'white')
                el.style.fill = 'white'
            }

            const exportBtnPNG = document.getElementById('export-png-btn')
            exportBtnPNG.addEventListener('click', function () {
                const factor = 1
                map.exportMapToPNG(MAPWIDTH * factor, MAPHEIGHT + 120 * factor) // width, height, scale (for better quality)
            })

            const exportBtnSVG = document.getElementById('export-svg-btn')
            exportBtnSVG.addEventListener('click', function () {
                map.exportMapToSVG('CH03M02-map') // filename without extension
            })

            const exportLegendBtn = document.getElementById('export-legend-btn')
            exportLegendBtn.addEventListener('click', function () {
                const legendSVG = document.getElementById('legend-container')
                exportToSVG(legendSVG, 'CH03M02-legend.svg')
            })

            const exportSmallMultiplesBtn = document.getElementById('export-small-multiples-btn')
            exportSmallMultiplesBtn.addEventListener('click', function () {
                const smallMultiplesSVG = buildSmallMultiplesExportSVG()
                if (!smallMultiplesSVG) return
                exportToSVG(smallMultiplesSVG, 'CH03M02-small-multiples.svg')
            })

            const hueSlider = document.getElementById('hue-slider')
            const hueSliderValue = document.getElementById('hue-slider-value')
            const chromaSlider = document.getElementById('chroma-slider')
            const chromaSliderValue = document.getElementById('chroma-slider-value')
            const breaksSlider = document.getElementById('breaks-slider')
            const breaksSliderValue = document.getElementById('breaks-slider-value')
            const spreadSlider = document.getElementById('spread-slider')
            const spreadSliderValue = document.getElementById('spread-slider-value')
            const lightnessSlider = document.getElementById('lightness-slider')
            const lightnessSliderValue = document.getElementById('lightness-slider-value')

            updateTernaryControls()

            function updateTernaryControls() {
                const hue = Number(hueSlider.value)
                const chroma = Number(chromaSlider.value)
                const breaks = Number(breaksSlider.value)
                const spread = Number(spreadSlider.value)
                const lightness = Number(lightnessSlider.value)

                hueSliderValue.textContent = String(hue)
                chromaSliderValue.textContent = String(chroma)
                breaksSliderValue.textContent = String(breaks)
                spreadSliderValue.textContent = spread.toFixed(1)
                lightnessSliderValue.textContent = String(lightness)

                map.ternarySettings({ hue, chroma, breaks, spread, lightness })
                updateExtremeColors()
                map.updateClassification()
                map.updateStyle()
                map.legend(getLegendConfig())
                map.updateLegend()
                refreshBadgeColors()
                //if (map.legendObj()) map.legendObj().update()
            }

            hueSlider.addEventListener('input', function () {
                updateTernaryControls()
            })

            chromaSlider.addEventListener('input', function () {
                updateTernaryControls()
            })

            breaksSlider.addEventListener('input', function () {
                updateTernaryControls()
            })

            spreadSlider.addEventListener('input', function () {
                updateTernaryControls()
            })

            lightnessSlider.addEventListener('input', function () {
                updateTernaryControls()
            })
        </script>
    </body>
</html>
