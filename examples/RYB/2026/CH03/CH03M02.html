<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="../../insets/insets.css" />
    </head>

    <body>
        <style>
            .em-zoom-buttons {
                transform: translate(1%, 15%);
                display: none;
            }
            .em-legend-subtitle {
                font-size: 12px;
            }
            #legend-container {
                transform: translate(526px, 73px);
            }
            #newInsets {
                filter: drop-shadow(0px 1px 1px rgba(0, 0, 0, 0.3));
            }
        </style>
        <svg id="container" width="100%" height="97vh">
            <svg id="map"></svg>
            <g id="newInsets"></g>
            <svg id="legend-container"></svg>
        </svg>
        <script src="../../../../build/eurostatmap.js"></script>
        <script src="https://unpkg.com/d3@7"></script>
        <script src="../../insets/overseas.js"></script>
        <script type="module">
            import { json } from 'https://cdn.jsdelivr.net/npm/d3-fetch@3/+esm'

            // Generate fresh inset config with new svgIds (from overseas.js)
            const insetsCfg = createOutermostInsetsConfig()
            const insetBoxPosition = [540, 415]
            createInsetDOMElements(insetsCfg, insetBoxPosition)

            //get data
            const [bachelor_pct, masters_pct, phd_pct] = await Promise.all([
                json('./data/bachelor_pct.json'),
                json('./data/masters_pct.json'),
                json('./data/phd_pct.json'),
            ])

            const red = '#E04040'
            const blue = '#388AE2'
            const green = '#33A033'

            const legendLabelPosition = 'corner' // 'corner' | 'inside'
            const legendColorTarget = 'points' // 'points' | 'triangles'
            const meanCentering = true

            const MAPWIDTH = 797
            const MAPHEIGHT = 677

            const map = eurostatmap
                .map('trivariateChoropleth')
                .insets(insetsCfg)
                .footer(true)
                .header(true)
                .insetBoxPosition(insetBoxPosition)
                .position({ x: 5050000, y: 3490000, z: 6100 })
                .footnote(
                    'Note: share of students enrolled in ISCED levels 6, 7 and 8. Germany: NUTS level 1. The Netherlands and Albania: national data. Iceland and Albania: 2023. Liechtenstein and Türkiye: 2022. <br>Source: Eurostat (online data code: educ_uoe_enrt06)'
                )
                .footnoteWrap(85)

                .width(MAPWIDTH)
                .height(MAPHEIGHT)
                .title('Tertiary education students, 2021')
                .subtitle(
                    `<tspan x="14" dy="5"><tspan class="badge-green">Bachelor</tspan> , <tspan class="badge-blue">Masters</tspan> or <tspan class="badge-red">PHD</tspan> students.</tspan>`
                )
                .nutsLevel(2)
                .ternarySettings({
                    hue: 160,
                    chroma: 130,
                    lightness: 50,
                    contrast: 0.3,
                    spread: 3.5,
                    breaks: 29,
                    meanCentering: meanCentering,
                })
                .legend({
                    svgId: 'legend-container',
                    title: 'Education level',
                    subtitle: `
                        <tspan x="8" dy="0">Areas with more <tspan fill="${green}" class='subtitle-color'>green</tspan> have a higher % of</tspan>
                        <tspan x="8" dy="1.2em">  bachelor students. Areas with more <tspan fill="${blue}" class='subtitle-color'>blue</tspan> have </tspan>
                        <tspan x="8" dy="1.2em">a higher % of masters students and areas with 
                        <tspan x="8" dy="1.2em">more <tspan fill="${red}" class='subtitle-color'>red</tspan> have a higher</tspan> % of PHD students.</tspan>
                    `,

                    boxOpacity: 0.99,
                    width: 250,
                    height: 280,
                    labels: legendLabelPosition == 'corner' ? ['Bachelors', 'Masters', 'PHD'] : ['← Bachelors', 'Masters →', 'PHD →'],
                    labelPosition: legendLabelPosition,
                    padding: { top: 55, right: 30, bottom: 10, left: 47 },
                    showLines: true,
                    gridBreaks: 5,
                    minorSubdivisions: 2,
                    showCenter: meanCentering,
                    centerLabel: 'Average',
                    showData: true,
                    colorTarget: legendColorTarget, // 'points' | 'triangles'
                    centerAnnotationOffsets: {
                        labelX: -35,
                        labelY: 15,
                        curveX: 0,
                        curveY: 0,
                    },
                })
                .zoomButtons(true)
                .zoomButtonsPosition([740, 590])
                .zoomExtent([0.9, 100])

            map.onBuild(() => {
                //add footnote

                d3.select('#map #em-footnote-2').remove()
                d3.selectAll('#map')
                    .append('text')
                    .attr('x', MAPWIDTH - 310)
                    .attr('y', MAPHEIGHT + 92)
                    .attr('class', 'em-footnote')
                    .attr('id', 'em-footnote-2')
                    .html('Cartography: GISCO. Boundaries: ©EuroGeographics ©OSM')

                const newInsets = d3.select('#newInsets')
                if (!newInsets.empty()) {
                    d3.select('#map').node().appendChild(newInsets.node())
                }

                const badges = [
                    { cls: 'badge-green', color: green },
                    { cls: 'badge-blue', color: blue },
                    { cls: 'badge-red', color: red },
                ]

                // subtitle badges (inside #map SVG)
                const svgEl = document.querySelector('#' + map.svgId_)
                if (svgEl) {
                    const subtitle = svgEl.querySelector('.em-subtitle')
                    if (subtitle) {
                        badges.forEach(({ cls, color }) => {
                            const tspan = subtitle.querySelector('.' + cls)
                            if (!tspan) return
                            applyBadgeToElement(tspan, color)
                        })
                    }
                }

                // axis title badges (inside #legend-container SVG)
                const legendSvgEl = document.querySelector('#legend-container')
                if (legendSvgEl) {
                    legendSvgEl.querySelectorAll('.em-ternary-axis-title').forEach((el, i) => {
                        applyBadgeToElement(el, badges[i].color)
                    })
                }
            })

            map.stat('v1', { label: 'Bachelor', unitText: '%' })
                .stat('v2', { label: 'Master', unitText: '%' })
                .stat('v3', { label: 'PhD', unitText: '%' })
            map.build()
            map.statData('v1').setData(filterNulls(bachelor_pct))
            map.statData('v2').setData(filterNulls(masters_pct))
            map.statData('v3').setData(filterNulls(phd_pct))

            // map.updateStatValues()

            function filterNulls(obj) {
                return Object.fromEntries(Object.entries(obj).filter(([_, v]) => v !== null))
            }

            function applyBadgeToElement(el, color) {
                const bb = el.getBBox()
                const pad = { x: 3, y: 2 }
                const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect')
                rect.setAttribute('x', bb.x - pad.x)
                rect.setAttribute('y', bb.y - pad.y)
                rect.setAttribute('width', bb.width + pad.x * 2)
                rect.setAttribute('height', bb.height + pad.y * 2)
                rect.setAttribute('rx', 2)
                rect.setAttribute('fill', color)

                // find the correct parent: for tspan, walk up to the text's parent (a <g> or <svg>)
                const insertParent = el.closest('text') ? el.closest('text').parentNode : el.parentNode
                const insertBefore = el.closest('text') || el
                insertParent.insertBefore(rect, insertBefore)

                el.setAttribute('fill', 'white')
                el.style.fill = 'white'
            }
        </script>
    </body>
</html>
