<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Pie chart map - CH02M03</title>
        <link rel="stylesheet" href="../../styles.css" />
        <link rel="stylesheet" href="../../insets/insets.css" />
        <style>
            .em-cntbn {
                opacity: 0.7 !important;
            }
            .map-container {
                width: 100%;
            }
        </style>
    </head>

    <body>
        <div>
            <button id="export-png-btn" type="button">Download map as PNG</button>
            <button id="export-svg-btn" type="button">Download map as SVG</button>
            <label for="composition-type-select">Type:</label>
            <select id="composition-type-select">
                <option value="pie" selected>pie</option>
                <option value="flag">flag</option>
                <option value="ring">ring</option>
                <option value="segment">segment</option>
                <option value="radar">radar</option>
                <option value="agepyramid">agepyramid</option>
                <option value="halftone">halftone</option>
                <option value="stripe">stripe</option>
            </select>
        </div>
        <div id="maps-wrapper">
            <svg id="container" class="map-container" height="900px">
                <svg id="map"></svg>
                <g id="newInsets"></g>
            </svg>
        </div>

        <script src="../../../../build/eurostatmap.js"></script>
        <script src="../../insets/overseas.js"></script>
        <script src="https://unpkg.com/d3@7"></script>

        <script>
            const PIESIZE = 9
            const MAPWIDTH = 900
            const MAPHEIGHT = 700
            const minSizeByType = {
                pie: 13,
                flag: 11,
                ring: 13,
                segment: 12,
                radar: 13,
                agepyramid: 13,
                halftone: 12,
            }
            const maxSizeByType = {
                pie: 13,
                flag: 11,
                ring: 13,
                segment: 12,
                radar: 13,
                agepyramid: 13,
                halftone: 12,
            }

            async function loadCustomPieData() {
                const [circulatory, cancer, respiratory, other] = await Promise.all([
                    fetch('./data/circulatory.json').then((r) => r.json()),
                    fetch('./data/cancer.json').then((r) => r.json()),
                    fetch('./data/respiratory.json').then((r) => r.json()),
                    fetch('./data/other.json').then((r) => r.json()),
                ])

                const countries = new Set([...Object.keys(circulatory), ...Object.keys(cancer), ...Object.keys(respiratory), ...Object.keys(other)])

                const myData = {}

                countries.forEach((country) => {
                    myData[country] = {
                        I: circulatory[country] ?? 0,
                        C: cancer[country] ?? 0,
                        J: respiratory[country] ?? 0,
                        Other: other[country] ?? 0,
                    }
                })

                return myData
            }

            async function initMaps() {
                const myData = await loadCustomPieData()
                const categoryCodes = ['I', 'C', 'J', 'Other']
                const categoryLabels = ['Circulatory', 'Cancer', 'Respiratory', 'Other']
                const categoryColors = ['#33A033', '#2644A7', '#C05F03', '#B09120']

                let currentMap = null
                let currentMapKind = 'pie'

                function resetMapDom() {
                    d3.select('#map').selectAll('*').remove()
                    d3.select('#newInsets').selectAll('*').remove()
                }

                function applyCommonLayout(m) {
                    return m
                        .width(MAPWIDTH)
                        .height(MAPHEIGHT)

                        .title('Main causes of death')
                        .subtitle('(% of all deaths, by NUTS 1 regions, 2023)')
                        .header(true)
                        .footer(true)
                        .footnote(
                            'Note: the most common causes of death in the EU were – diseases of the circulatory system (32.5%), cancer (malignant neoplasms; 24.2%), diseases of the respiratory system (7.8%). Source: Eurostat (online data code: hlth_cd_asdr2)'
                        )
                        .footnoteWrap(90)
                        .zoomButtons(false)
                        .legend({
                            x: 20,
                            y: 190,
                            boxOpacity: 0,
                            boxFill: 'white',
                            sizeLegend: false,
                            colorLegend: {
                                title: 'Cause of death',
                            },
                            noDataPadding: -10,
                            noDataText: 'Data not available',
                        })
                        .onBuild(() => {
                            d3.select('#map #em-footnote-2').remove()
                            d3.select('#map')
                                .append('text')
                                .attr('x', MAPWIDTH - 272)
                                .attr('y', MAPHEIGHT + 83)
                                .attr('class', 'em-footnote')
                                .attr('id', 'em-footnote-2')
                                .html('Administrative Boundaries: ©EuroGeographics ©OSM')

                            d3.select('#map')
                                .append('text')
                                .attr('x', MAPWIDTH - 209)
                                .attr('y', MAPHEIGHT + 96)
                                .attr('class', 'em-footnote')
                                .attr('id', 'em-footnote-2')
                                .html('Cartography: Eurostat – GISCO, 06/2026')
                        })
                }

                function buildPieMap(type = 'pie') {
                    resetMapDom()
                    const insetBoxPosition = [MAPWIDTH - 250, 70]
                    const insetsCfg = createOutermostInsetsConfig()
                    createInsetDOMElements(document.getElementById('newInsets'), insetsCfg, insetBoxPosition)

                    const patch = {
                        type,
                        minSize: minSizeByType[type] ?? minSizeByType.pie,
                        maxSize: maxSizeByType[type] ?? maxSizeByType.pie,
                        otherColor: '#EFD18C',
                        otherText: 'Other',
                        order: ['Other', 'I', 'C', 'J'],
                    }

                    if (type === 'flag') {
                        patch.reverseOrder = true
                        patch.stripesOrientation = 1
                    } else {
                        patch.reverseOrder = false
                        patch.stripesOrientation = 0
                    }

                    const pieMap = applyCommonLayout(
                        eurostatmap
                            .map('pie')
                            .dorling(true)
                            .svgId('map')
                            .insets(insetsCfg)
                            .containerId('container')
                            .scale('20M')
                            .nutsLevel('mixed')
                            .nutsYear(2024)
                            .statPie({
                                customData: myData,
                                categoryCodes,
                                categoryLabels,
                                categoryColors,
                            })
                            .compositionSettings(patch)
                    )

                    if (type === 'flag') {
                        pieMap.dorlingSettings({ padding: -1.7 })
                    } else {
                        pieMap.dorlingSettings({ padding: 0 })
                    }

                    pieMap.build()
                    currentMap = pieMap
                    currentMapKind = 'pie'
                }

                function buildStripeMap() {
                    resetMapDom()
                    const insetBoxPosition = [MAPWIDTH - 250, 70]
                    const insetsCfg = createOutermostInsetsConfig()
                    createInsetDOMElements(document.getElementById('newInsets'), insetsCfg, insetBoxPosition)

                    const stripeMap = applyCommonLayout(
                        eurostatmap
                            .map('stripe')
                            .svgId('map')
                            .insets(insetsCfg)
                            .containerId('container')
                            .scale('20M')
                            .nutsLevel(1)
                            .nutsYear(2024)
                            .statComp({
                                customData: myData,
                                categoryCodes,
                                categoryLabels,
                                categoryColors,
                            })
                    )

                    stripeMap.build()
                    currentMap = stripeMap
                    currentMapKind = 'stripe'
                }

                buildPieMap('pie')

                const typeSelect = document.getElementById('composition-type-select')
                typeSelect.addEventListener('change', (event) => {
                    const type = event.target.value

                    if (type === 'stripe') {
                        buildStripeMap()
                        return
                    }

                    if (currentMapKind === 'stripe') {
                        buildPieMap(type)
                        return
                    }

                    const patch = {
                        type,
                        minSize: minSizeByType[type] ?? minSizeByType.pie,
                        maxSize: maxSizeByType[type] ?? maxSizeByType.pie,
                    }

                    // Keep previous showcase behavior for flag layout.
                    if (type === 'flag') {
                        patch.reverseOrder = true
                        patch.stripesOrientation = 1
                        currentMap.dorlingSettings({ padding: -1.7 })
                    } else {
                        patch.reverseOrder = false
                        patch.stripesOrientation = 0
                        currentMap.dorlingSettings({ padding: 0 })
                    }

                    currentMap.compositionSettings(patch)
                    currentMap.updateClassification()
                    currentMap.updateStyle()
                })

                document.getElementById('export-png-btn').addEventListener('click', () => {
                    if (currentMap) currentMap.exportMapToPNG(MAPWIDTH, MAPHEIGHT + 120)
                })

                document.getElementById('export-svg-btn').addEventListener('click', () => {
                    if (currentMap) currentMap.exportMapToSVG('CH02M03')
                })
            }

            initMaps()
        </script>
    </body>
</html>
