<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>eurostat-map.js</title>
        <link rel="stylesheet" href="../../styles.css" />
        <style>
            .em-cntbn {
                opacity: 0.3 !important;
            }
        </style>
    </head>

    <body>
        <svg id="map"></svg>
        <script src="../../../../build/eurostatmap.js"></script>

        <script>
            //https://ec.europa.eu/eurostat/api/dissemination/statistics/1.0/data/hlth_cd_asdr2?format=JSON&unit=RT&sex=T&age=TOTAL&icd10=C&lang=EN
            const PIESIZE = 9
            const MAPWIDTH = 1000
            const MAPHEIGHT = 800
            const map = eurostatmap
                .map('pie')
                .width(MAPWIDTH)
                .height(MAPHEIGHT)
                .title('Causes of death')
                .subtitle('% share of all deaths, by NUTS 2 regions')
                .dorling(true) // to prevent overlapping
                .scale('60M')
                .nutsLevel(2)
                .statPie(
                    {
                        eurostatDatasetCode: 'hlth_cd_asdr2',
                        filters: { sex: 'T', time: '2020', age: 'TOTAL', unit: 'RT' },
                        unitText: 'death rate per 100 000',
                    },
                    'icd10', //parameter that the categories belong to
                    ['J', 'C', 'I'], //category codes
                    ['Respiratory', 'Cancer', 'Circulatory'], //category labels
                    [' #33A033', '#AF155C', '#2644A7'], //colours
                    'A-R_V-Y' //code for the total (all causes of death) A-R_V-Y is no longer the code???
                )
                .pieOtherColor('#B09120')
                .pieOtherText('Other')
                .pieMinRadius(PIESIZE)
                .pieMaxRadius(PIESIZE)
                .header(true)
                .footer(true)

                .legend({
                    x: MAPWIDTH - 200,
                    y: 90,
                    boxOpacity: 0,
                    boxFill: 'white',
                    sizeLegend: false,
                    colorLegend: {
                        title: 'Cause of death',
                    },
                    noDataPadding: -10,
                })

            map.build()
        </script>
    </body>
</html>
