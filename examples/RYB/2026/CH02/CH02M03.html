<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>eurostat-map.js</title>
        <link rel="stylesheet" href="../../styles.css" />
        <link rel="stylesheet" href="../../insets/insets.css" />
        <style>
            .em-cntbn {
                opacity: 0.7 !important;
            }
            #maps-wrapper {
            }
            .map-container {
                width: 100%;
            }
        </style>
    </head>

    <body>
        <div>
            <button id="export-png-btn" type="button">Download map as PNG</button>
            <button id="export-svg-btn" type="button">Download map as SVG</button>
        </div>
        <div id="maps-wrapper">
            <svg id="container" class="map-container" height="900px">
                <svg id="map"></svg>
                <g id="newInsets"></g>
            </svg>
            <svg id="container2" class="map-container" height="900px">
                <svg id="map2"></svg>
                <g id="newInsets2"></g>
            </svg>
        </div>

        <script src="../../../../build/eurostatmap.js"></script>
        <script src="../../insets/overseas.js"></script>
        <script src="https://unpkg.com/d3@7"></script>

        <script>
            const PIESIZE = 9
            const MAPWIDTH = 900
            const MAPHEIGHT = 700

            async function loadCustomPieData() {
                const [circulatory, cancer, respiratory, other] = await Promise.all([
                    fetch('./data/circulatory.json').then((r) => r.json()),
                    fetch('./data/cancer.json').then((r) => r.json()),
                    fetch('./data/respiratory.json').then((r) => r.json()),
                    fetch('./data/other.json').then((r) => r.json()),
                ])

                const countries = new Set([...Object.keys(circulatory), ...Object.keys(cancer), ...Object.keys(respiratory), ...Object.keys(other)])

                const myData = {}

                countries.forEach((country) => {
                    myData[country] = {
                        I: circulatory[country] ?? 0,
                        C: cancer[country] ?? 0,
                        J: respiratory[country] ?? 0,
                        Other: other[country] ?? 0,
                    }
                })

                return myData
            }

            async function initMaps() {
                const myData = await loadCustomPieData()

                const insetBoxPosition = [MAPWIDTH - 250, 70]
                const insetsCfg = createOutermostInsetsConfig()
                const insetsCfg2 = createOutermostInsetsConfig()

                createInsetDOMElements(document.getElementById('newInsets'), insetsCfg, insetBoxPosition)
                createInsetDOMElements(document.getElementById('newInsets2'), insetsCfg2, insetBoxPosition)

                const map = eurostatmap
                    .map('pie')
                    .svgId('map')
                    .insets(insetsCfg)
                    .containerId('container')
                    .width(MAPWIDTH)
                    .height(MAPHEIGHT)
                    .title('Main causes of death')
                    .subtitle('% of all deaths, by NUTS 1 regions, 2021')
                    .dorling(true)
                    .scale('20M')
                    .nutsLevel('mixed')
                    .nutsYear(2024)
                    .statPie({
                        customData: myData,
                        categoryCodes: ['I', 'C', 'J', 'Other'],
                        categoryLabels: ['Circulatory', 'Cancer', 'Respiratory', 'Other'],
                        categoryColors: ['#2644A7', '#AF155C', '#33A033', '#EFD18C'],
                    })
                    .compositionSettings({
                        type: 'pie',
                        otherColor: '#EFD18C',
                        otherText: 'Other',
                        minSize: 13,
                        maxSize: 13,
                    })
                    .header(true)
                    .footer(true)
                    .footnote(
                        'Note: the most common causes of death in the EU were – diseases of the circulatory system, cancer, diseases of the respiratory system. <br>Source: Custom JSON files'
                    )
                    .footnoteWrap(100)
                    .zoomButtons(false)
                    .legend({
                        x: 20,
                        y: 190,
                        boxOpacity: 0,
                        boxFill: 'white',
                        sizeLegend: false,
                        colorLegend: {
                            title: 'Cause of death',
                        },
                        noDataPadding: -10,
                    })
                    .onBuild(() => {
                        d3.select('#map #em-footnote-2').remove()
                        d3.select('#map')
                            .append('text')
                            .attr('x', MAPWIDTH - 310)
                            .attr('y', MAPHEIGHT + 83)
                            .attr('class', 'em-footnote')
                            .attr('id', 'em-footnote-2')
                            .html('Cartography: GISCO. Boundaries: ©EuroGeographics ©OSM')
                    })
                    .build()

                const map2 = eurostatmap
                    .map('pie')
                    .dorling(true)
                    .dorlingSettings({
                        padding: -1.5,
                    })
                    .svgId('map2')
                    .insets(insetsCfg2)
                    .containerId('container2')
                    .compositionSettings({
                        type: 'flag',
                        minSize: 11,
                        maxSize: 11,
                        reverseOrder: true,
                        offsetAngle: 90,
                        otherColor: '#EFD18C',
                        stripesOrientation: 1,
                        // offsetAngle: 30, //radar/halftone
                    })
                    .width(MAPWIDTH)
                    .height(MAPHEIGHT)
                    .title('Main causes of death')
                    .subtitle('% of all deaths, by NUTS 1 regions, 2021')
                    .dorling(true)
                    .scale('20M')
                    .nutsLevel('mixed')
                    .nutsYear(2024)
                    .statPie({
                        customData: myData,
                        categoryCodes: ['I', 'C', 'J', 'Other'],
                        categoryLabels: ['Circulatory', 'Cancer', 'Respiratory', 'Other'],
                        categoryColors: ['#2644A7', '#AF155C', '#33A033', '#EFD18C'],
                    })
                    .header(true)
                    .footer(true)
                    .footnote(
                        'Note: the most common causes of death in the EU were – diseases of the circulatory system, cancer, diseases of the respiratory system. <br>Source: Custom JSON files'
                    )
                    .footnoteWrap(100)
                    .zoomButtons(false)
                    .legend({
                        x: 20,
                        y: 190,
                        boxOpacity: 0,
                        boxFill: 'white',
                        sizeLegend: false,
                        colorLegend: {
                            title: 'Cause of death',
                        },
                        noDataPadding: -10,
                    })
                    .onBuild(() => {
                        d3.select('#map #em-footnote-2').remove()
                        d3.select('#map')
                            .append('text')
                            .attr('x', MAPWIDTH - 310)
                            .attr('y', MAPHEIGHT + 83)
                            .attr('class', 'em-footnote')
                            .attr('id', 'em-footnote-2')
                            .html('Cartography: GISCO. Boundaries: ©EuroGeographics ©OSM')
                    })
                    .build()

                document.getElementById('export-png-btn').addEventListener('click', () => {
                    map2.exportMapToPNG(MAPWIDTH, MAPHEIGHT + 120)
                })

                document.getElementById('export-svg-btn').addEventListener('click', () => {
                    map2.exportMapToSVG('CH02M03')
                })
            }

            initMaps()
        </script>
    </body>
</html>
