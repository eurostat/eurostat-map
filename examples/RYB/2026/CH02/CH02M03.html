<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>eurostat-map.js</title>
        <link rel="stylesheet" href="../../styles.css" />
        <style>
            .em-cntbn {
                opacity: 0.3 !important;
            }
            #maps-wrapper {
                display: flex;
                width: 100%;
            }

            .map-container {
                width: 50%;
                height: 200vh;
                display: block;
            }
        </style>
    </head>

    <body>
        <div id="maps-wrapper">
            <svg id="container1" class="map-container" height="200vh">
                <svg id="map1"></svg>
                <g id="newInsets1"></g>
            </svg>

            <svg id="container2" class="map-container" height="200vh">
                <svg id="map2"></svg>
                <g id="newInsets2"></g>
            </svg>
        </div>

        <script src="../../../../build/eurostatmap.js"></script>
        <script src="../../insets/overseas.js"></script>

        <script>
            //https://ec.europa.eu/eurostat/api/dissemination/statistics/1.0/data/hlth_cd_asdr2?format=JSON&time=2023&unit=RT&sex=T&age=TOTAL&icd10=I&lang=EN            const PIESIZE = 9
            const MAPWIDTH = 900
            const MAPHEIGHT = 700
            const PIESIZE = 9

            const map1 = eurostatmap
                .map('pie')
                .svgId('map1')
                .containerId('container1')
                .width(MAPWIDTH)
                .height(MAPHEIGHT)
                .title('Causes of death')
                .subtitle('death rate per 100 000 inhabitants, by NUTS 2 regions, 2021')
                .dorling(true) // to prevent overlapping
                .scale('20M')
                .nutsLevel(2)
                .statPie(
                    {
                        eurostatDatasetCode: 'hlth_cd_asdr2',
                        filters: { sex: 'T', time: '2021', age: 'TOTAL', unit: 'RT' },
                        unitText: 'death rate per 100 000',
                    },
                    'icd10', //parameter that the categories belong to
                    ['I', 'C', 'J'], //category codes
                    ['Circulatory', 'Cancer', 'Respiratory'], //category labels
                    ['#2644A7', '#AF155C', '#33A033'], //colours
                    'A-R_V-Y' //code for the total (all causes of death) A-R_V-Y is no longer the code???
                )
                .pieOtherColor('#EFD18C')
                .pieOtherText('Other')
                .pieMinRadius(PIESIZE)
                .pieMaxRadius(PIESIZE)
                .header(true)
                .footer(true)
                .legend({
                    x: 20,
                    y: 190,
                    boxOpacity: 0,
                    boxFill: 'white',
                    sizeLegend: false,
                    colorLegend: {
                        title: 'Cause of death',
                    },
                    noDataPadding: -10,
                })
                .zoomButtons(false)
                .build()

            const map2 = eurostatmap
                .map('pie')
                .svgId('map2')
                .containerId('container2')
                .width(MAPWIDTH)
                .height(MAPHEIGHT)
                .title('Causes of death')
                .subtitle('death rate per 100 000 inhabitants, by NUTS 1 regions, 2021')
                .dorling(true) // to prevent overlapping
                .scale('20M')
                .nutsLevel(1)
                .statPie(
                    {
                        eurostatDatasetCode: 'hlth_cd_asdr2',
                        filters: { sex: 'T', time: '2021', age: 'TOTAL', unit: 'RT' },
                        unitText: 'death rate per 100 000',
                    },
                    'icd10', //parameter that the categories belong to
                    ['I', 'C', 'J'], //category codes
                    ['Circulatory', 'Cancer', 'Respiratory'], //category labels
                    ['#2644A7', '#AF155C', '#33A033'], //colours
                    'A-R_V-Y' //code for the total (all causes of death) A-R_V-Y is no longer the code???
                )
                .pieOtherColor('#EFD18C')
                .pieOtherText('Other')
                .pieMinRadius(13)
                .pieMaxRadius(13)
                .header(true)
                .footer(true)
                .zoomButtons(false)
                .legend({
                    x: 20,
                    y: 190,
                    boxOpacity: 0,
                    boxFill: 'white',
                    sizeLegend: false,
                    colorLegend: {
                        title: 'Cause of death',
                    },
                    noDataPadding: -10,
                })
                .build()
        </script>
    </body>
</html>
