<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>eurostat-map.js</title>
        <link rel="stylesheet" href="../../styles.css" />
        <link rel="stylesheet" href="../../insets/insets.css" />
        <style>
            .em-cntbn {
                opacity: 0.7 !important;
            }
            #maps-wrapper {
                display: flex;
                width: 100%;
            }
            .map-container {
                width: 100%;
                height: 200vh;
                display: block;
            }
        </style>
    </head>

    <body>
        <div>
            <button id="export-png-btn" type="button">Download map as PNG</button>
            <button id="export-svg-btn" type="button">Download map as SVG</button>
        </div>
        <div id="maps-wrapper">
            <svg id="container" class="map-container" height="200vh">
                <svg id="map"></svg>
                <g id="newInsets"></g>
            </svg>
            <svg id="container2" class="map-container" height="200vh">
                <svg id="map2"></svg>
                <g id="newInsets2"></g>
            </svg>
        </div>

        <script src="../../../../build/eurostatmap.js"></script>
        <script src="../../insets/overseas.js"></script>
        <script src="https://unpkg.com/d3@7"></script>

        <script>
            //https://ec.europa.eu/eurostat/api/dissemination/statistics/1.0/data/hlth_cd_asdr2?format=JSON&time=2023&unit=RT&sex=T&age=TOTAL&icd10=I&lang=EN            const PIESIZE = 9
            const MAPWIDTH = 900
            const MAPHEIGHT = 700
            const PIESIZE = 9

            // Generate fresh inset config with new svgIds (from overseas.js)
            const insetBoxPosition = [MAPWIDTH - 250, 70]
            const insetsCfg = createOutermostInsetsConfig()
            const insetsCfg2 = createOutermostInsetsConfig()
            createInsetDOMElements(document.getElementById('newInsets'), insetsCfg, insetBoxPosition)
            createInsetDOMElements(document.getElementById('newInsets2'), insetsCfg2, insetBoxPosition)

            //pies
            const map = eurostatmap
                .map('pie')
                .svgId('map')
                .insets(insetsCfg)
                .containerId('container')
                .width(MAPWIDTH)
                .height(MAPHEIGHT)
                .title('Main causes of death')
                .subtitle('% of all deaths, by NUTS 1 regions, 2021')
                .dorling(true) // to prevent overlapping
                .scale('20M')
                .nutsLevel(1)
                .statPie({
                    eurostatDatasetCode: 'hlth_cd_asdr2',
                    filters: {
                        sex: 'T',
                        time: '2021',
                        age: 'TOTAL',
                        unit: 'RT',
                    },
                    unitText: 'death rate per 100 000',

                    categoryParameter: 'icd10',
                    categoryCodes: ['I', 'C', 'J'],
                    categoryLabels: ['Circulatory', 'Cancer', 'Respiratory'],
                    categoryColors: ['#2644A7', '#AF155C', '#33A033'],

                    totalCode: 'A-R_V-Y',
                })
                .pieOtherColor('#EFD18C')
                .pieOtherText('Other')
                .pieMinRadius(13)
                .pieMaxRadius(13)
                .header(true)
                .footer(true)
                .footnote(
                    'Note: the most common causes of death in the EU were – diseases of the circulatory system (32.5%), cancer (malignant neoplasms; 24.2%), diseases of the respiratory system (7.8%). EU standardised death rate = 963.4 per 100 000 inhabitants. <br>Source: Eurostat (online data code: hlth_cd_asdr2)'
                )
                .footnoteWrap(100)
                .zoomButtons(false)
                .legend({
                    x: 20,
                    y: 190,
                    boxOpacity: 0,
                    boxFill: 'white',
                    sizeLegend: false,
                    colorLegend: {
                        title: 'Cause of death',
                    },
                    noDataPadding: -10,
                })
                .onBuild(() => {
                    //add cartography text
                    d3.select('#map2 #em-footnote-2').remove()
                    d3.selectAll('#map2')
                        .append('text')
                        .attr('x', MAPWIDTH - 310)
                        .attr('y', MAPHEIGHT + 83)
                        .attr('class', 'em-footnote')
                        .attr('id', 'em-footnote-2')
                        .html('Cartography: GISCO. Boundaries: ©EuroGeographics ©OSM')
                })
                .build()

            //stripes
            const map2 = eurostatmap
                .map('stripe')
                .svgId('map2')
                .insets(insetsCfg2)
                .containerId('container2')
                .width(MAPWIDTH)
                .height(MAPHEIGHT)
                .title('Main causes of death')
                .subtitle('% of all deaths, by NUTS 1 regions, 2021')
                .dorling(true) // to prevent overlapping
                .scale('20M')
                .nutsLevel(1)
                .statComp({
                    eurostatDatasetCode: 'hlth_cd_asdr2',
                    filters: {
                        sex: 'T',
                        time: '2021',
                        age: 'TOTAL',
                        unit: 'RT',
                    },
                    unitText: 'death rate per 100 000',
                    categoryParameter: 'icd10',
                    categoryCodes: ['I', 'C', 'J'],
                    categoryLabels: ['Circulatory', 'Cancer', 'Respiratory'],
                    categoryColors: ['#2644A7', '#AF155C', '#33A033'],
                    totalCode: 'A-R_V-Y',
                })
                .stripeWidth(12)

                .header(true)
                .footer(true)
                .footnote(
                    'Note: the most common causes of death in the EU were – diseases of the circulatory system (32.5%), cancer (malignant neoplasms; 24.2%), diseases of the respiratory system (7.8%). EU standardised death rate = 963.4 per 100 000 inhabitants. <br>Source: Eurostat (online data code: hlth_cd_asdr2)'
                )
                .footnoteWrap(100)
                .zoomButtons(false)
                .zoomExtent([0.5, 20])
                .legend({
                    x: 20,
                    y: 190,
                    boxOpacity: 0,
                    boxFill: 'white',
                    sizeLegend: false,
                    colorLegend: {
                        title: 'Cause of death',
                    },
                    noDataPadding: -10,
                })
                .onBuild(() => {
                    //add cartography text
                    d3.select('#map2 #em-footnote-2').remove()
                    d3.selectAll('#map2')
                        .append('text')
                        .attr('x', MAPWIDTH - 310)
                        .attr('y', MAPHEIGHT + 83)
                        .attr('class', 'em-footnote')
                        .attr('id', 'em-footnote-2')
                        .html('Cartography: GISCO. Boundaries: ©EuroGeographics ©OSM')
                })
                .build()

            const exportBtnPNG = document.getElementById('export-png-btn')
            exportBtnPNG.addEventListener('click', function () {
                const factor = 1
                map2.exportMapToPNG(MAPWIDTH * factor, MAPHEIGHT + 120 * factor) // width, height, scale (for better quality)
            })

            const exportBtnSVG = document.getElementById('export-svg-btn')
            exportBtnSVG.addEventListener('click', function () {
                map2.exportMapToSVG('CH02M03') // filename without extension
            })
        </script>
    </body>
</html>
