<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Businesses in service industries by region, 2023</title>
        <link rel="stylesheet" href="styles.css" />
    </head>

    <body>
        <div id="container">
            <div class="header">
                <div class="map-title">Businesses in service industries, by region, 2023</div>
                <div class="dropdown-containers">
                    <div class="dropdown-container">
                        <div class="dropdown-label">Select a variable:</div>
                        <ewc-singleselect
                            id="unitSelect"
                            options='[
    [
    { "name": "Persons employed per local unit", "code": "EMP_PLOC_NR", "status": "active" },
        { "name": "Labour costs per person", "code":"LC_EMP_LOC_TEUR", "status": "active" }

    ]
  ]'
                            defaultOption="EMP_PLOC_NR"
                            activeOption="EMP_PLOC_NR"
                            dropdownHeight="200px"
                            selectedLabel="Select below"
                            invertColors="false"
                            searchMode=""
                        ></ewc-singleselect>
                    </div>
                    <div class="dropdown-container">
                        <div class="dropdown-label">Select a NACE section:</div>
                        <ewc-singleselect
                            id="NACESelect"
                            options='[
    [
    { "name": "Transportation and storage", "code": "H", "status": "active" },
    { "name": "Accommodation and food service", "code": "I", "status": "active" },
    { "name": "Information and communication", "code": "J", "status": "active" },
    { "name": "Real estate", "code": "L", "status": "active" },
    { "name": "Professional, scientific and technical activities", "code": "M", "status": "active" },
    { "name": "Administrative and support service", "code": "N", "status": "active" }
    ]
  ]'
                            defaultOption="H"
                            activeOption="H"
                            dropdownHeight="200px"
                            selectedLabel="Select below"
                            invertColors="false"
                            searchMode=""
                        ></ewc-singleselect>
                    </div>
                </div>
            </div>

            <div id="map-container">
                <svg id="map" width="100%" height="100%" preserveAspectRatio="xMidYMid meet"></svg>
            </div>
        </div>

        <script src="../eurostatmap.min.js"></script>
        <script type="module" src="./dropdown/dropdown.js"></script>
        <script type="module" src="./ch-map.js"></script>
    </body>
</html>
