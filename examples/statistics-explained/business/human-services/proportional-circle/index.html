<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Businesses in the human services, by region, 2023</title>
        <link rel="stylesheet" href="styles.css" />
    </head>

    <body>
        <div id="container">
            <div class="header">
                <div class="map-title">Businesses in the human services, by region, 2023</div>
                <div class="dropdown-containers">
                    <div class="dropdown-container">
                        <div class="dropdown-label">Select a variable:</div>
                        <ewc-singleselect
                            id="unitSelect"
                            options='[
    [
    { "name": "Local units", "code": "LOC_NR", "status": "active" },
    { "name": "Persons employed in local units", "code": "EMP_LOC_NR", "status": "active" },
    { "name": "Wages and salaries in local units", "code":"WAGE_LOC_MEUR", "status": "active"}
    ]
  ]'
                            defaultOption="LOC_NR"
                            activeOption="LOC_NR"
                            dropdownHeight="200px"
                            selectedLabel="Select below"
                            invertColors="false"
                            searchMode=""
                        ></ewc-singleselect>
                    </div>
                    <div class="dropdown-container">
                        <div class="dropdown-label">Select a NACE section:</div>
                        <ewc-singleselect
                            id="NACESelect"
                            options='[
    [
    { "name": "Education", "code": "P", "status": "active" },
    { "name": "Human health and social work activities", "code": "Q", "status": "active" },
    { "name": "Arts, entertainment and recreation", "code": "R", "status": "active" }
    ]
  ]'
                            defaultOption="P"
                            activeOption="P"
                            dropdownHeight="200px"
                            selectedLabel="Select below"
                            invertColors="false"
                            searchMode=""
                        ></ewc-singleselect>
                    </div>
                </div>
            </div>

            <div id="map-container">
                <svg id="map" width="100%" height="100%" preserveAspectRatio="xMidYMid meet"></svg>
            </div>
        </div>

        <script src="../eurostatmap.min.js"></script>
        <script type="module" src="./dropdown/dropdown.js"></script>
        <script type="module" src="./ps-map.js"></script>
    </body>
</html>
