<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Total Population</title>
    </head>

    <body>
        <svg id="map"></svg>
        <script src="../../build/eurostatmap.js"></script>
        <script>
            eurostatmap
                .map('proportionalSymbol')
                .scale('60M')
                .title('Total population')
                .width(800)
                .subtitle('2021')
                .nutsLevel(0)
                .psSettings({
                    fill: '#cc4c02',
                    minSize: 3,
                    maxSize: 45
                })
                .stat('value', {
                    eurostatDatasetCode: 'demo_r_pjanaggr3',
                    unitText: 'people',
                    filters: {
                        TIME: '2021',
                        SEX: 'T', // Total
                        AGE: 'TOTAL', // All ages
                    },
                })
                .encoding('size', { stat: 'value' })
                .legend({ x: 530, y: 130, title: 'People', boxOpacity: 0, sizeLegend: { values: [85000000, 40000000, 5000000] } })
                .build()
        </script>
    </body>
</html>
