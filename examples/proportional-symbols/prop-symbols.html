<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Proportional Symbols</title>
    </head>

    <body>
        <svg id="map"></svg>
        <script src="../../build/eurostatmap.js"></script>

        <!-- for formatting legend labels -->
        <script src="https://d3js.org/d3-format.v2.min.js"></script>

        <script>
            const euSVG = `<svg width="20" height="20" xmlns="http://www.w3.org/2000/svg">
  <circle cx="10" cy="10" r="8" stroke="black" stroke-width="1"  />
  <text x="50%" y="50%" text-anchor="middle" stroke="black" stroke-width="0px" dy=".3em" font-size="8" font-family="Arial" fill="black">€</text>
</svg>
`

            //set legend labels locale
            d3.formatDefaultLocale({
                decimal: ',',
                thousands: ' ',
                grouping: [3],
                currency: ['', '€'],
            })
            eurostatmap
                .map('ps')
                .scale('60M')
                .nutsLevel(0)
                .width(800)
                .title('Gross domestic product (GDP) across Europe')
                .subtitle('Total GDP (size) and GDP per inhabitant (color)')
                .zoomExtent([1, 2])
                //GDP per inhabitant
                .stat('symbolColor', {
                    eurostatDatasetCode: 'nama_10r_3gdp',
                    unitText: 'EUR/inhabitant',
                    filters: { unit: 'EUR_HAB', time: '2018' },
                })
                .encoding('color', { stat: 'symbolColor' })
                // total GDP
                .stat('symbolSize', {
                    eurostatDatasetCode: 'nama_10r_3gdp',
                    unitText: 'Million EUR',
                    filters: { unit: 'MIO_EUR', time: '2018' },
                })
                .encoding('size', { stat: 'symbolSize' })

                //prop symbols size & styling
                .psSettings({ customSVG: euSVG }) // Search https://materialdesignicons.com/ for examples and simply copy and paste the "d" string of the SVG here.
                .psSettings({
                    maxSize: 4,
                    minSize: 1
                }) //minSize/maxsize for customPaths indicates scale() value, not pixel size
                .psSettings({
                    fillOpacity: 1,
                    offset: { x: -9, y: -10 },
                    stroke: 'black',
                    strokeWidth: 10
                })

                //data-driven colour configuration
                .psSettings({
                    classificationMethod: 'threshold',
                    thresholds: [10000, 20000, 30200, 40000, 50000],
                    colors: ['#E9ECF6', '#C1C9EB', '#93A2DC', '#677CD2', '#3C57B0', '#15246B']
                })

                //legend config
                .legend({
                    x: 570,
                    y: 20,
                    ascending: false,
                    boxPadding: 15,
                    sizeLegend: {
                        title: 'Total GDP (million EUR)',
                        cellNb: 3,
                        shapePadding: 0,
                        titlePadding: 50,
                        shapeOffsets: { x: 0, y: -50 },
                        labelOffsets: { x: 70, y: -40 },
                        labelFormatter: d3.format(',.2r'),
                    },
                    colorLegend: {
                        title: 'GDP per inhabitant (EUR)',
                        labelFormatter: d3.format(',.2r'),
                    },
                    legendSpacing: 0,
                })
                //.labelling(true)
                .build()
        </script>
    </body>
</html>
