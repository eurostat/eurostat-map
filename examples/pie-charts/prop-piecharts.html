<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Proportional Pie Charts</title>
    </head>

    <body>
        <svg id="map"></svg>
        <script src="https://unpkg.com/eurostat-map"></script>

        <script>
            const ourMap = eurostatmap
                .map('pie')
                .scale('60M')
                .nutsLevel(1)
                .pieOtherColor('#FFCC80')
                .pieOtherText('Other')
                .pieMinRadius(6)
                .statPie({
                    eurostatDatasetCode: 'agr_r_animal',
                    filters: { unit: 'THS_HD', time: '2018' },
                    unitText: '1000 heads',
                    categoryParameter: 'animals',
                    categoryCodes: ['A2000', 'A2300', 'A2400', 'A3100', 'A4100', 'A4200'],
                    categoryLabels: ['bovines', 'cows', 'buffalos', 'pigs', 'sheeps', 'goats'],
                    categoryColors: ['#7fc97f', '#beaed4', '#fdc086', '#ffff99', '#386cb0', '#f0027f'],
                })
                .title('Most common causes of death')
                .subtitle('Death rate (pie size) and cause of death (color), 2022')
                .legend({
                    x: 530,
                    y: 70,
                    boxOpacity: 0,
                    boxFill: 'white',
                    titleFontWeight: 'bold',
                    sizeLegend: {
                        title: 'Death rate per 100 000 inh.',
                        titlePadding: 10,
                        values: [400, 1600],
                    },
                    colorLegend: {
                        title: 'Cause of death',
                    },
                })

            //add our own stat data objects
            for (let k in stats) {
                let statObject = {
                    code: k,
                    unitText: 'death rate per 100 000',
                }

                ourMap.stat(k, statObject) // adds 'stat' object to map.statData_ during build
            }
            ourMap.statCodes_ = ['cancer', 'circulatory', 'respiratory'] //set stat codes to show on map
            ourMap.build()

            // update our stat data after build
            for (let key in ourMap.statData_) {
                if (stats[key]) {
                    // fix this
                    ourMap.statData_[key].setData({ ...stats[key] })
                }
            }

            ourMap.updateStatValues()
        </script>
    </body>
</html>
