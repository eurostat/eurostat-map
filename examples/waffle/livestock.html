<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Livestock Waffle Charts</title>
        <style>
            body {
                margin: 0;
            }
        </style>
    </head>

    <body>
        <svg id="map"></svg>
        <!-- <script src="../../build/eurostatmap.js"></script> -->
        <script src="../../build/eurostatmap.js"></script>

        <script>
            const ourMap = eurostatmap
                .map('waffle')
                .dorling(true)
                .header(true)
                .footer(true)
                .title('Livestock in the EU, 2024')
                .subtitle('Number of animals (pie size) and type of animal (color), 2024')
                .scale('60M')
                .waffleSettings({
                    minSize: 10,
                    maxSize: 30,
                    gridSize: 10,
                    cellPadding: 0,
                    strokeFill: 'white',
                    strokeWidth: 0,
                    roundedCorners: 0,
                    tooltipSize: 80,
                })
                .nutsLevel(1)
                .stat('composition', {
                    eurostatDatasetCode: 'agr_r_animal',
                    filters: { unit: 'THS_HD', time: '2024' },
                    unitText: 'heads',
                    categoryParameter: 'animals',
                    categoryCodes: ['A2000', 'A2300', 'A2400', 'A3100', 'A4100', 'A4200'],
                    categoryLabels: ['Bovines', 'Cows', 'Buffalos', 'Pigs', 'Sheep', 'Goats'],
                    categoryColors: ['#E04040', '#208486', '#2644A7', '#AF155C', '#672DC4', '#33A033'],
                    transform: (value) => value * 1000, // convert from 1000 heads to heads
                })
                .encoding('composition', { stat: 'composition' })

                .legend({
                    position: 'top right',
                    boxOpacity: 1,
                    boxFill: 'white',
                    titleFontWeight: 'bold',
                    sizeLegend: {
                        title: 'Number of animals',
                        titlePadding: 10,
                        values: [13000000, 500000],
                    },
                    colorLegend: {
                        title: 'Type of animal',
                        noData: false,
                    },
                })
                .legendButton(true)
                .build()
        </script>
    </body>
</html>
