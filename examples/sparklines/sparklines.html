<!doctype html>
<html lang="en">
    <head>
        <title>Spark Charts</title>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    </head>

    <body>
        <svg id="map"></svg>
        <script src="https://unpkg.com/eurostat-map"></script>
        <script>
            eurostatmap
                .map('sparkline')
                .title('Regional unemployment trend (mixed NUTS)')
                .subtitle("Regression test: nutsLevel('mixed') for sparklines")
                .nutsLevel(2)
                .statSpark({
                    eurostatDatasetCode: 'lfst_r_lfu3rt',
                    filters: { isced11: 'TOTAL', sex: 'T', age: 'Y15-74', unit: 'PC' },
                    dates: ['2015', '2016', '2017', '2018', '2019', '2020', '2021', '2022', '2023', '2024'],
                    labels: ['2015', '2016', '2017', '2018', '2019', '2020', '2021', '2022', '2023', '2024'],
                })
                .sparkType('line')
                .sparkLineOffsets({ x: 10, y: -15 })
                .sparkLineWidth(24)
                .sparkLineHeight(16)
                .sparkLineStrokeWidth(1.2)
                .sparkLineOpacity(0.85)
                .sparkLineColor((itemValue) => {
                    if (itemValue >= 12) return '#b91c1c'
                    if (itemValue >= 8) return '#c2410c'
                    if (itemValue >= 5) return '#0369a1'
                    return '#0f766e'
                })
                .sparkTooltipChart({
                    width: 220,
                    height: 120,
                    margin: { left: 35, right: 10, top: 8, bottom: 45 },
                    circleRadius: 1.5,
                })
                .legend({
                    title: 'Unemployment rate (%)',
                    x: 10,
                    y: 90,
                    noData: true,
                    colorLegend: {
                        show: true,
                        title: ' ',
                        items: [
                            { color: '#b91c1c', label: '>= 12%' },
                            { color: '#c2410c', label: '8% to < 12%' },
                            { color: '#0369a1', label: '5% to < 8%' },
                            { color: '#0f766e', label: '< 5%' },
                        ],
                    },
                    scaleLegend: {
                        xAxisRotation: -60,
                        xAxisTickStep: 1,
                        showMaxRegion: true,
                        showExampleChart: true,
                    },
                })
                .showSourceLink(true)
                .build()
        </script>
    </body>
</html>
