<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>eurostat-map Examples</title>
        <style>
            :root {
                --bg: #f6f8fb;
                --card: #ffffff;
                --text: #0f172a;
                --muted: #475569;
                --line: #dbe2ea;
                --accent: #0a66c2;
                --accent-dark: #084f96;
            }

            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                font-family: 'Segoe UI', Roboto, Arial, sans-serif;
                background: linear-gradient(180deg, #f8fafc 0%, #eef3f9 100%);
                color: var(--text);
            }

            .wrap {
                max-width: 1280px;
                margin: 0 auto;
                padding: 28px 16px 48px;
            }

            .hero {
                background: var(--card);
                border: 1px solid var(--line);
                border-radius: 16px;
                padding: 20px;
                margin-bottom: 18px;
            }

            h1 {
                margin: 0;
                font-size: 30px;
                line-height: 1.2;
            }

            .sub {
                margin-top: 8px;
                color: var(--muted);
            }

            .actions {
                margin-top: 12px;
                display: flex;
                gap: 10px;
                flex-wrap: wrap;
            }

            .btn {
                text-decoration: none;
                border: 1px solid var(--line);
                border-radius: 10px;
                padding: 8px 12px;
                color: var(--text);
                font-weight: 600;
                background: #fff;
            }

            .btn.primary {
                background: var(--accent);
                color: #fff;
                border-color: var(--accent);
            }

            .btn.primary:hover {
                background: var(--accent-dark);
                border-color: var(--accent-dark);
            }

            .stats {
                margin: 10px 0 16px;
                color: var(--muted);
                font-size: 14px;
            }

            .controls {
                margin: 12px 0 8px;
            }

            .search {
                width: 100%;
                max-width: 420px;
                border: 1px solid var(--line);
                border-radius: 10px;
                padding: 10px 12px;
                font-size: 14px;
                color: var(--text);
                background: #fff;
            }

            .search:focus {
                outline: 2px solid rgba(10, 102, 194, 0.2);
                border-color: var(--accent);
            }

            .grid {
                display: grid;
                gap: 14px;
                grid-template-columns: repeat(auto-fill, minmax(245px, 1fr));
            }

            .card {
                background: var(--card);
                border: 1px solid var(--line);
                border-radius: 14px;
                overflow: hidden;
                display: flex;
                flex-direction: column;
                min-height: 280px;
            }

            .thumb {
                width: 100%;
                aspect-ratio: 16 / 10;
                object-fit: cover;
                background: #eef2f7;
                border-bottom: 1px solid var(--line);
                transition:
                    filter 160ms ease,
                    box-shadow 160ms ease,
                    transform 160ms ease;
            }

            .thumb-link {
                display: block;
                text-decoration: none;
                color: inherit;
            }

            .card:hover .thumb,
            .card:focus-within .thumb {
                filter: saturate(1.08) brightness(1.02);
                box-shadow:
                    0 0 0 1px rgba(10, 102, 194, 0.25),
                    0 6px 18px rgba(10, 102, 194, 0.18);
                transform: scale(1.01);
            }

            .content {
                padding: 10px 12px 12px;
                display: flex;
                flex-direction: column;
                gap: 8px;
                flex: 1;
            }

            .title {
                margin: 0;
                font-size: 16px;
                line-height: 1.3;
            }

            .meta {
                margin: 0;
                color: var(--muted);
                font-size: 13px;
            }

            .row {
                margin-top: auto;
                display: flex;
                gap: 8px;
            }

            .row a {
                text-decoration: none;
                font-size: 13px;
                font-weight: 700;
                border-radius: 8px;
                padding: 6px 8px;
                border: 1px solid var(--line);
                color: var(--text);
                background: #fff;
            }

            .row a.live {
                color: #fff;
                background: var(--accent);
                border-color: var(--accent);
            }

            .row a.live:hover {
                background: var(--accent-dark);
                border-color: var(--accent-dark);
            }

            /* ── Layout ── */
            .layout {
                display: flex;
                gap: 20px;
                align-items: flex-start;
            }

            .sidebar {
                flex-shrink: 0;
                width: 168px;
                position: sticky;
                top: 20px;
            }

            .sidebar-panel {
                background: var(--card);
                border: 1px solid var(--line);
                border-radius: 14px;
                padding: 14px 12px;
            }

            .sidebar-heading {
                margin: 0 0 10px;
                font-size: 11px;
                font-weight: 700;
                letter-spacing: 0.07em;
                text-transform: uppercase;
                color: var(--muted);
            }

            .sidebar-nav {
                list-style: none;
                margin: 0;
                padding: 0;
                display: flex;
                flex-direction: column;
                gap: 2px;
            }

            .sidebar-nav li a {
                display: block;
                text-decoration: none;
                font-size: 13px;
                color: var(--text);
                padding: 5px 8px;
                border-radius: 7px;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            .sidebar-nav li a:hover {
                background: var(--bg);
            }

            .sidebar-nav li a.active {
                background: var(--accent);
                color: #fff;
                font-weight: 600;
            }

            .main {
                flex: 1;
                min-width: 0;
            }

            @media (max-width: 768px) {
                .layout {
                    flex-direction: column;
                }
                .sidebar {
                    width: 100%;
                    position: static;
                }
                .sidebar-nav {
                    flex-direction: row;
                    flex-wrap: wrap;
                }
            }

            @media (max-width: 640px) {
                h1 {
                    font-size: 24px;
                }
            }
        </style>
    </head>
    <body>
        <main class="wrap">
            <section class="hero">
                <h1>eurostat-map live examples</h1>
                <p class="sub">See eurostat-map in action with live examples.</p>
                <div class="actions">
                    <a class="btn primary" href="https://eurostat.github.io/eurostat-map/docs/reference.html">See documentation</a>
                    <a class="btn" href="https://eurostat.github.io/eurostat-map/">Project README</a>
                </div>
            </section>

            <div class="layout">
                <aside class="sidebar">
                    <div class="sidebar-panel">
                        <p class="sidebar-heading">Map Types</p>
                        <ul class="sidebar-nav" id="sidebar-nav"></ul>
                    </div>
                </aside>

                <div class="main">
                    <div class="controls">
                        <input class="search" id="search" type="search" placeholder="Search examples by name or topic" aria-label="Search examples" />
                    </div>
                    <p class="stats" id="stats"></p>
                    <section class="grid" id="grid"></section>
                </div>
            </div>
        </main>

        <script src="./scripts/example-manifest.js"></script>
        <script>
            const { paths, previewPathFor, legacyPreviewPathFor, isShowcasePath, typeForPath } = window.eurostatMapExamples
            const fallbackPreview = '../docs/img/previews/euro.png'

            const toTitle = (path) => {
                const name = path.replace(/\.html$/, '')
                const parts = name.split('/')
                const tail = parts[parts.length - 1] === 'index' && parts.length > 1 ? parts[parts.length - 2] : parts[parts.length - 1]
                return tail.replace(/[-_]/g, ' ').replace(/\b\w/g, (m) => m.toUpperCase())
            }

            const detectDesc = (path) => {
                if (path.includes('statistics-explained/')) return 'Statistics Explained story map'
                if (path.includes('RYB/')) return 'RYB chapter example'
                if (path.includes('ur/')) return 'Urban-rural chapter example'
                if (path.includes('CCM/')) return 'Country comparison map'
                return 'Interactive map example'
            }

            const titleCache = new Map()

            const readHeadTitle = (html) => {
                try {
                    const doc = new DOMParser().parseFromString(html, 'text/html')
                    const title = doc.querySelector('head title')?.textContent?.trim()
                    return title || ''
                } catch {
                    return ''
                }
            }

            const resolveTitle = async (path) => {
                if (titleCache.has(path)) return titleCache.get(path)

                let title = ''
                try {
                    const response = await fetch('./' + path)
                    if (response.ok) {
                        title = readHeadTitle(await response.text())
                    }
                } catch {
                    title = ''
                }

                if (!title) title = toTitle(path)
                titleCache.set(path, title)
                return title
            }

            const showcasePaths = paths.filter(isShowcasePath)
            let examples = []

            // Build sidebar nav
            const allTypes = ['All', ...Array.from(new Set(showcasePaths.map((p) => typeForPath(p) || 'Other'))).sort()]
            let activeType = 'All'

            const sidebarNav = document.getElementById('sidebar-nav')
            allTypes.forEach((type) => {
                const li = document.createElement('li')
                const a = document.createElement('a')
                a.textContent = type
                a.href = '#'
                if (type === 'All') a.className = 'active'
                a.addEventListener('click', (e) => {
                    e.preventDefault()
                    activeType = type
                    sidebarNav.querySelectorAll('a').forEach((el) => el.classList.remove('active'))
                    a.classList.add('active')
                    renderExamples(search.value)
                })
                li.appendChild(a)
                sidebarNav.appendChild(li)
            })

            const grid = document.getElementById('grid')
            const stats = document.getElementById('stats')
            const search = document.getElementById('search')

            const loadExamples = async () => {
                const loaded = await Promise.all(
                    showcasePaths.map(async (path) => [path, await resolveTitle(path), detectDesc(path), previewPathFor(path), typeForPath(path)])
                )
                examples = loaded
                renderExamples(search.value)
            }

            const renderExamples = (query) => {
                const q = (query || '').trim().toLowerCase()
                const filtered = examples.filter(([file, title, desc, , type]) => {
                    const matchesType = activeType === 'All' || type === activeType
                    if (!matchesType) return false
                    if (!q) return true
                    return file.toLowerCase().includes(q) || title.toLowerCase().includes(q) || desc.toLowerCase().includes(q)
                })

                stats.textContent = filtered.length + ' of ' + examples.length + ' examples'
                grid.textContent = ''

                for (const [file, title, desc, previewPath] of filtered) {
                    const card = document.createElement('article')
                    card.className = 'card'

                    const thumbLink = document.createElement('a')
                    thumbLink.className = 'thumb-link'
                    thumbLink.href = './' + file

                    const img = document.createElement('img')
                    img.className = 'thumb'
                    img.loading = 'lazy'
                    img.src = previewPath
                    img.onerror = () => {
                        if (img.src.endsWith(legacyPreviewPathFor(file).replace(/^\.\//, ''))) {
                            img.onerror = null
                            img.src = fallbackPreview
                            return
                        }

                        img.src = legacyPreviewPathFor(file)
                    }
                    img.alt = title + ' preview'
                    thumbLink.appendChild(img)
                    card.appendChild(thumbLink)

                    const content = document.createElement('div')
                    content.className = 'content'

                    const h = document.createElement('h2')
                    h.className = 'title'
                    h.textContent = title
                    content.appendChild(h)

                    const p = document.createElement('p')
                    p.className = 'meta'
                    p.textContent = desc
                    content.appendChild(p)

                    const row = document.createElement('div')
                    row.className = 'row'

                    const live = document.createElement('a')
                    live.className = 'live'
                    live.href = './' + file
                    live.textContent = 'Live'
                    row.appendChild(live)

                    const src = document.createElement('a')
                    src.href = 'https://github.com/eurostat/eurostat-map/blob/master/examples/' + file
                    src.textContent = 'Source'
                    row.appendChild(src)

                    content.appendChild(row)
                    card.appendChild(content)
                    grid.appendChild(card)
                }
            }

            stats.textContent = 'Loading examples...'
            loadExamples()
            search.addEventListener('input', () => renderExamples(search.value))
        </script>
    </body>
</html>
