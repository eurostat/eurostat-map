<!doctype html>
<html lang="en">
    <head>
        <title>Choropleth Grid Cartogram</title>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    </head>

    <body>
        <svg id="map"></svg>
        <script src="../../../build/eurostatmap.js"></script>

        <script>
            const map = eurostatmap
                .map('choropleth')
                .title('GDP per inhabitant 2024')
                .subtitle('Ensures that each region is assigned equal visual importance')
                .stat('value', {
                    eurostatDatasetCode: 'nama_10r_3gdp',
                    unitText: 'euro per inhabitant',
                    filters: { TIME: '2024', UNIT: 'EUR_HAB' },
                })
                .encoding('fill', { stat: 'value' })
                .gridCartogram(true)
                .gridCartogramShape('square')
                .gridCartogramCellPadding(2)
                //.gridCartogramContainerPadding(110)
                .numberOfClasses(6)
                .nutsLevel(0)
                .legend({ x: 10, y: 120, title: 'Euro per inhabitant', titlePadding: 0, boxOpacity: 0, histogram: false })
                .build()
        </script>
    </body>
</html>
