<!doctype html>
<html lang="en">
    <head>
        <title>Dorling Cartogram</title>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    </head>

    <body>
        <div id="container">
            <svg id="map"></svg>
        </div>

        <script src="../../build/eurostatmap.js"></script>

        <script>
            const map = eurostatmap
                .map('proportionalSymbol')
                .title('Total GDP')
                .subtitle('2024')
                .psSettings({
                    shape: 'circle',
                    spikeWidth: 7
                })
                .nutsLevel(0)
                .stat('symbolSize', {
                    eurostatDatasetCode: 'nama_10r_3gdp',
                    unitText: 'Million EUR',
                    filters: { unit: 'MIO_EUR', time: '2024' },
                })
                .encoding('size', { stat: 'symbolSize' })
                .legend({ title: 'Euro', x: 550, y: 90, boxOpacity: 0, sizeLegend: { noData: true } })
                .labels({ values: true, shadows: true })
                .insets(false)
                .psSettings({
                    codeLabels: true,
                    stroke: 'white',
                    strokeWidth: 0.5,
                    sizeScale: 'linear',
                    minSize: 10,
                    maxSize: 60,
                })
                .dorling(true)
            // try: cross, diamond, star, square, wye, circle, triangle, rectangle https://github.com/d3/d3-shape#symbols

            map.build()
        </script>
    </body>
</html>
