<!doctype html>
<html lang="en">
    <head>
        <title>Dorling Cartogram</title>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    </head>

    <body>
        <div id="container">
            <svg id="map"></svg>
        </div>

        <script src="https://unpkg.com/eurostat-map"></script>

        <script>
            const map = eurostatmap
                .map('proportionalSymbol')
                .title('Total GDP')
                .subtitle('2024')
                .psShape('circle')
                .psSpikeWidth(7)
                .nutsLevel(0)
                .stat('size', {
                    eurostatDatasetCode: 'nama_10r_3gdp',
                    unitText: 'Million EUR',
                    filters: { unit: 'MIO_EUR', time: '2024' },
                })
                .legend({ title: 'Euro', x: 550, y: 90, boxOpacity: 0, sizeLegend: { noData: true } })
                .labels({ values: true, shadows: true })
                .psCodeLabels(true)
                .insets(false)
                .psStroke('white')
                .psStrokeWidth(0.5)
                .psSizeScale('linear')
                .psMinSize(10)
                .dorling(true)
                .psMaxSize(60) // try: cross, diamond, star, square, wye, circle, triangle, rectangle https://github.com/d3/d3-shape#symbols

            map.build()
        </script>
    </body>
</html>
