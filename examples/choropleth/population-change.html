<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Population Change</title>
    </head>

    <body>
        <svg id="map"></svg>
        <script src="https://unpkg.com/eurostat-map"></script>
        <!-- <script src="../../build/eurostatmap.js"></script> -->
        <!-- for eurostatmap.colorFun() -->
        <script src="https://d3js.org/d3-color.v2.min.js"></script>
        <script src="https://d3js.org/d3-interpolate.v2.min.js"></script>
        <script src="https://d3js.org/d3-scale-chromatic.v2.min.js"></script>

        <script>
            const map = eurostatmap
                .map('choropleth')
                .title('Population change')
                .subtitle('Crude rate of total population change, 2024')
                .nutsLevel(2)
                .nutsYear(2024)
                .stat({
                    eurostatDatasetCode: 'demo_r_gind3',
                    filters: { indic_de: 'GROWRT', time: 2024 },
                    unitText: '‰',
                })
                .colors(['#B2182B', '#D6604D', '#F4A582', '#FDDBC7', '#D1E5F0', '#92C5DE', '#4393C3', '#2166AC'])
                .classificationMethod('threshold')
                .threshold([-15, -10, -5, 0, 5, 10, 15])
                .legend({
                    x: 550,
                    y: 70,
                    title: 'Per 1 000 persons',
                    titlePadding: 0,
                    titleFontSize: 14,
                    labelFontSize: 13,
                    labelType: 'threshold',
                    pointOfDivergenceLabel: 'Increase|Decrease',
                    pointOfDivergence: 4,
                    divergingArrowLength: 50,
                    boxOpacity: 1,
                    noData: false,
                })

            map.build()
        </script>
    </body>
</html>
