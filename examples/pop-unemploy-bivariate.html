<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    </head>

    <body>
        <svg id="map"></svg>
        <!-- <script src="https://unpkg.com/eurostat-map"></script> -->
        <script src="https://unpkg.com/eurostat-map"></script>
        <script src="https://unpkg.com/d3"></script>
        <script>
            let height = window.innerHeight
            const n = 5
            const oranges = d3.schemeOranges[n + 1].slice(0, -1)
            const blues = d3.schemeBlues[n + 1].slice(0, -1)
            const color = {
                domain: d3.range(n * n),
                range: d3.cross(blues, oranges).map(mixblend),
            }
            function mixblend([a, b]) {
                a = d3.rgb(a)
                b = d3.rgb(b)
                const l = Math.min(250, b.r + b.g + b.b)
                a.r *= b.r / l
                a.g *= b.g / l
                a.b *= b.b / l
                return a.hex()
            }
            const map = eurostatmap
                .map('chbi')
                .scale('60M')
                .position({ x: 4800000, y: 3600000, z: 6500 })
                .title('Unemployment and population density')
                .subtitle('% people unemployed aged 20-64 years & inhabitants per km², 2023')
                .showZoomButtons(true)
                .nutsLevel(2)
                .stat('v1', {
                    eurostatDatasetCode: 'demo_r_d3dens',
                    unitText: 'inh./km²',
                    filters: { time: '2023' },
                })
                .stat('v2', {
                    eurostatDatasetCode: 'lfst_r_lfu3rt',
                    filters: { age: 'Y20-64', sex: 'T', unit: 'PC', time: 2023 },
                    unitText: '% unemployed',
                })
                .numberOfClasses(n)
                .classToFillStyle((class1, class2) => {
                    if (class1 == null || class2 == null || class1 === ':' || class2 === ':') return null

                    const idx = class1 * n + class2
                    return color.range[idx]
                })
                .legend({
                    label1: 'Population',
                    label2: 'Unemployment',
                    x: 530,
                    y: 100,
                    boxOpacity: 0,
                    rotation: -45,
                    yAxisTitleOffset: { x: 5, y: 13 },
                })
                .noDataFillStyle('#bfbfbf')
                .zoomExtent([0.9, 100])
                .build()
        </script>
    </body>
</html>
