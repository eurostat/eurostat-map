<!doctype html>
<html lang="en">
    <head>
        <title>Map Stamp</title>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    </head>

    <body>
        <svg id="map"></svg>
        <script src="https://unpkg.com/eurostat-map"></script>

        <script>
            const map = eurostatmap
                .map('choropleth')
                .title('Stamp showing EU average')
                .stat({ eurostatDatasetCode: 'demo_r_d3dens', unitText: 'people/km²', filters: { TIME: '2020' } })
                // EU stars example
                .stamp({
                    text: 'EU~=~21.4',
                    padding: 5,
                    x: 20, // left edge of stamp
                    y: 200,
                    fontSize: 12, // fixed font size — shape grows to fit
                    textAnchor: 'start', // grows rightward from x
                    shape: 'eu-stars',
                    starSize: 0.6, // 30% of the default "just touching" size — leaves visible gaps between stars
                    rx: 3,
                    strokeWidth: 1.5,
                })
                .zoomButtons(true)
                .zoomButtonsPosition([750, 10])
                .legend({ x: 570, y: 50, title: 'Population density' })
                .build()
        </script>
    </body>
</html>
